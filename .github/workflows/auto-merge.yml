# Unified node-prefix PR auto-merge workflow.
#
# Design source of truth:
# docs/specs/2026-06-27-unified-auto-merge-sweeper-design.md
#
# Principles:
# - Claude/Anthropic action calls: 0.
# - Only node prefix branches are eligible: wsl/, macmini/,
#   desktop3060ti/, notebook3060/, mac/.
# - Draft PRs and PRs with no-auto-merge/manual gate labels or body markers are skipped.
# - Sensitive app/payment/design paths are held with a PR comment.
# - Non-sensitive PRs use GitHub native squash auto-merge when the repo supports
#   it; private repos without auto-merge support fall back to direct squash merge.

name: Auto-merge node-prefix PRs

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled, edited]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ⚠️ 제거 금지 (DO NOT REMOVE) — canonical company drift guard (T-260720-030, 2026-07-20).
  # daejong-page 회사정보 정본(src/data/site.ts 의 company)이 크로스레포 canonical
  # (kangdaejong.com/mb-components.js)의 vendored 스냅샷(src/data/_vendored/...)과 어긋나면 fail.
  # auto-merge 가 needs: 로 의존 → 드리프트 PR 은 auto-merge 되지 않는다(fail-closed,
  # kangdaejong-com #30 / founder #11 헤더·푸터 가드와 대칭). 본진 결정 (b): CI 라이브 fetch
  # 금지, vendored copy 대조만. pull_request_target 에서 PR 코드 실행 → secrets 참조 금지 +
  # permissions contents:read 고정. 이 격리를 약화하지 말 것.
  verify-shared-sources:
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.draft == false &&
      (startsWith(github.event.pull_request.head.ref, 'wsl/') ||
       startsWith(github.event.pull_request.head.ref, 'macmini/') ||
       startsWith(github.event.pull_request.head.ref, 'desktop3060ti/') ||
       startsWith(github.event.pull_request.head.ref, 'notebook3060/') ||
       startsWith(github.event.pull_request.head.ref, 'mac/'))
    permissions:
      contents: read
    steps:
      - name: Checkout PR merge result
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
      - name: Verify canonical company drift guard
        run: node scripts/verify-canonical-company.mjs

  auto-merge:
    runs-on: ubuntu-latest
    needs: verify-shared-sources
    if: >-
      github.event.pull_request.draft == false &&
      (startsWith(github.event.pull_request.head.ref, 'wsl/') ||
       startsWith(github.event.pull_request.head.ref, 'macmini/') ||
       startsWith(github.event.pull_request.head.ref, 'desktop3060ti/') ||
       startsWith(github.event.pull_request.head.ref, 'notebook3060/') ||
       startsWith(github.event.pull_request.head.ref, 'mac/')) &&
      !contains(github.event.pull_request.labels.*.name, 'no-auto-merge') &&
      !contains(github.event.pull_request.body, 'no-auto-merge') &&
      !contains(github.event.pull_request.body, 'manual-merge') &&
      !contains(github.event.pull_request.body, 'manual merge') &&
      !(contains(github.event.pull_request.body, '머지게이트') && contains(github.event.pull_request.body, '수동'))
    steps:
      - name: Detect sensitive files
        id: sensitive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_REPO: ${{ github.repository }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          files="$(gh pr diff "$PR_NUMBER" --name-only --repo "$GH_REPO")"
          printf '%s\n' "$files" > changed-files.txt

          is_app_repo=false
          is_payment_repo=false
          is_web_repo=false

          case "$REPO_NAME" in
            hanjul|hanjulai|simple-memo-app|dutch_pay_calculator|yakmukja|hankeup|pomodoro|wordyo|lotto-calc)
              is_app_repo=true
              ;;
          esac

          case "$REPO_NAME" in
            cheotireum)
              is_payment_repo=true
              ;;
          esac

          case "$REPO_NAME" in
            daejong-page|kangdaejong-com|ssamssae.github.io)
              is_web_repo=true
              ;;
          esac

          echo "is_web_repo=$is_web_repo" >> "$GITHUB_OUTPUT"

          sensitive=false
          reasons=()

          if [ "$is_app_repo" = true ]; then
            if grep -qiE '(^|/)pubspec\.yaml$|^android/app/build\.gradle$|^android/.*/AndroidManifest\.xml$|^ios/|^fastlane/|(^|/)metadata/|payment|iap|billing|store' changed-files.txt; then
              sensitive=true
              reasons+=("app/store/payment path")
            fi
          fi

          if [ "$is_payment_repo" = true ]; then
            if grep -qiE 'payment|settlement|toss|^lib/payment_' changed-files.txt; then
              sensitive=true
              reasons+=("payment path")
            fi
          fi

          # ⚠️ 제거 금지 (DO NOT REMOVE) — design/style + public content visual review gate.
          # Inherited from daejong-page T-260610-14. Web design/style changes
          # require manual visual review before merge. T-260627-29: also hold
          # public content data (src/data/, src/content/) so node edits to public
          # pages (e.g. fleet-policy.json -> /policy) don't auto-publish unreviewed.
          # 아니키 ack 2026-07-10 18:2x: "1 자동합격 허용 ... 코덱스 시켜"
          # T-260710-62: only PRs made entirely of insights/worklog/newsletter
          # collection files may proceed to the build + zero-broken-link gate.
          if [ "$is_web_repo" = true ]; then
            if grep -qiE '\.(css|scss|svg|astro)$|^public/.*\.html$|^src/data/' changed-files.txt; then
              sensitive=true
              reasons+=("web design/content path")
            fi
            if grep -qE '^src/content/' changed-files.txt; then
              if grep -qEv '^src/content/(insights|worklog|newsletter)/' changed-files.txt; then
                sensitive=true
                reasons+=("web content path outside approved collections or mixed PR")
              fi
            fi
            if [ "${PR_HEAD_REPO:-$GH_REPO}" != "$GH_REPO" ]; then
              sensitive=true
              reasons+=("public-page fork branch requires manual quantitative check")
            fi
          fi

          # ⚠️ 제거 금지 (DO NOT REMOVE) — policy/infra hard-rule gate (T-260628-39, 2026-06-28).
          # claude-skills/claude-automations 는 app/payment/web repo 가 아니라 위 감지가 전부 skip
          # → globals/CLAUDE.md 하드룰·워크플로우·훅 PR 이 무검토 auto-merge 되던 사고
          # (PR#139 globals, PR#214 ledger). 정책/하드룰/CI/가드(훅) 경로는 모든 repo 에서 hold 해
          # 본진 Claude 검토를 강제한다. scripts/ 는 블랭킷 제외(claude-automations 전부 scripts → 손0 회귀).
          if grep -qiE '(^|/)globals/|(^|/)(CLAUDE|AGENT|RTK)\.md$|^\.github/|(^|/)hooks/' changed-files.txt; then
            sensitive=true
            reasons+=("policy/infra path (globals/hard-rule/workflow/hooks)")
          fi
          # ⚠️ 제거 금지 (DO NOT REMOVE) — firing-path 스크립트 게이트 (T-260628-32, 2026-07-01).
          # 위 line 112 가 scripts/ 를 블랭킷 제외하나, scripts/ 안의 directive·fire·lease·
          # worker-toggle·dispatch·automation 류는 크로스노드 발사/제어 = 고위험 firing-path.
          # 실증: PR#213 heartbeat 훅이 무검토 auto-merge 우회. 위험 스크립트명만 hold 해 본진 검토 강제
          # (전체 scripts/ hold 는 손0 회귀라 이름 패턴으로 좁힘 — 신규 firing 스크립트도 카테고리로 포착).
          if grep -qiE '(^|/)scripts/[^/]*(directive|fire|lease|worker-toggle|dispatch|automation-|engine-policy)' changed-files.txt; then
            sensitive=true
            reasons+=("firing-path/control script (directive/fire/lease/worker-toggle/dispatch)")
          fi

          # ⚠️ 제거 금지 (DO NOT REMOVE) — PR body manual-gate marker honored (T-260629, 2026-06-29).
          # 게이트는 draft 상태/no-auto-merge 라벨만 봤고 PR body 의 'no-auto-merge' 텍스트는
          # 무시 → 라벨/draft 를 못 붙인 PR 이 의도와 달리 auto-merge 되던 사고(PR#228 persona
          # generator). body 에 no-auto-merge / 머지게이트:수동 / manual-merge 마커가 있으면 hold
          # 해 작성자의 수동게이트 의도를 존중한다. 라벨 누락에도 안전한 자매 게이트.
          # T-260702(PR#349): 구분자 없는 '머지게이트 수동'(공백형)이 미인식돼 렌더러 구현 PR 이
          # 자동머지된 동종 3번째 사고 — 구분자를 optional 로 완화. 사람이 쓰는 모든 폼을 존중한다.
          # T-260630-36: 구분자에 = ＝ 추가 — '머지게이트=수동'(등호) 마커가 미인식돼 안전민감
          # PR#251(ack-broker phase2)이 자동머지된 사고. 콜론/등호/전각 모두 수동게이트로 존중.
          if printf '%s' "${PR_BODY:-}" | grep -qiE 'no-auto-merge|머지게이트[[:space:]]*[:：=＝]?[[:space:]]*수동|manual[-[:space:]]merge'; then
            sensitive=true
            reasons+=("no-auto-merge requested in PR body")
          fi

          if [ "$sensitive" = true ]; then
            echo "sensitive=true" >> "$GITHUB_OUTPUT"
            printf 'reason=%s\n' "$(IFS=', '; echo "${reasons[*]}")" >> "$GITHUB_OUTPUT"
          else
            echo "sensitive=false" >> "$GITHUB_OUTPUT"
            echo "reason=" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout public-page gate
        if: steps.sensitive.outputs.is_web_repo == 'true' && steps.sensitive.outputs.sensitive != 'true'
        uses: actions/checkout@v4
        with:
          path: gate
          persist-credentials: false

      - name: Checkout public-page candidate
        if: steps.sensitive.outputs.is_web_repo == 'true' && steps.sensitive.outputs.sensitive != 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: candidate
          persist-credentials: false

      - name: Run public-page quantitative checks
        id: public_page_checks
        if: steps.sensitive.outputs.is_web_repo == 'true' && steps.sensitive.outputs.sensitive != 'true'
        shell: bash
        run: |
          set -euo pipefail

          blocked=false
          reason=""
          summary_file="$RUNNER_TEMP/public-page-internal-link-check.txt"

          report_block() {
            blocked=true
            reason="$1"
          }

          install_dependencies() {
            if [ -f package-lock.json ]; then
              npm ci
            elif [ -f pnpm-lock.yaml ]; then
              corepack enable
              pnpm install --frozen-lockfile
            elif [ -f yarn.lock ]; then
              corepack enable
              yarn install --immutable || yarn install --frozen-lockfile
            else
              npm install --no-audit --no-fund
            fi
          }

          if [ ! -d candidate ]; then
            report_block "public-page quantitative check failed: candidate checkout missing"
          else
            cd candidate
            if ! install_dependencies; then
              report_block "public-page quantitative check failed: dependency install failed"
            elif ! npm run build; then
              report_block "public-page quantitative check failed: npm run build failed"
            elif [ ! -d dist ]; then
              report_block "public-page quantitative check failed: dist/ missing after build"
            elif ! python3 "$GITHUB_WORKSPACE/gate/.github/scripts/check-public-page-internal-links.py" dist > "$summary_file" 2>&1; then
              check_summary="$(tr '\n' '; ' < "$summary_file" | sed 's/[[:space:]]\+/ /g' | cut -c1-500)"
              report_block "public-page quantitative check failed: 깨진 내부 링크 (${check_summary})"
            fi
          fi

          if [ "$blocked" = false ] && [ -f "$summary_file" ]; then
            cat "$summary_file"
          fi

          echo "blocked=$blocked" >> "$GITHUB_OUTPUT"
          printf 'reason=%s\n' "$reason" >> "$GITHUB_OUTPUT"

      - name: Hold gated PR
        if: steps.sensitive.outputs.sensitive == 'true' || steps.public_page_checks.outputs.blocked == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_REPO: ${{ github.repository }}
          HOLD_REASON: ${{ steps.sensitive.outputs.reason }}
          QUANT_REASON: ${{ steps.public_page_checks.outputs.reason }}
        run: |
          set -euo pipefail
          hold_reason="${HOLD_REASON:-}"
          if [ -n "${QUANT_REASON:-}" ]; then
            if [ -n "$hold_reason" ]; then
              hold_reason="$hold_reason, $QUANT_REASON"
            else
              hold_reason="$QUANT_REASON"
            fi
          fi
          existing="$(gh pr view "$PR_NUMBER" --repo "$GH_REPO" --json comments \
            --jq '[.comments[].body] | map(select((contains("auto-merge 보류") or contains("민감 경로 변경 감지")) and contains("게이트=T-260627-24"))) | length')"
          if [ "$existing" = "0" ]; then
            gh pr comment "$PR_NUMBER" --repo "$GH_REPO" \
              --body "🔒 auto-merge 보류(${hold_reason}) — 수동 검토 후 머지하세요. no-auto-merge 라벨을 붙이면 계속 제외됩니다. 게이트=T-260627-24."
          fi

      - name: Merge non-sensitive PR
        if: steps.sensitive.outputs.sensitive != 'true' && steps.public_page_checks.outputs.blocked != 'true'
        env:
          DEPLOY_PAT: ${{ secrets.DEPLOY_PAT }}
          GITHUB_TOKEN_FALLBACK: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          token="$DEPLOY_PAT"
          if [ -z "$token" ]; then
            token="$GITHUB_TOKEN_FALLBACK"
          fi
          export GH_TOKEN="$token"

          # ⚠️ 제거 금지 (DO NOT REMOVE) — merge prefers DEPLOY_PAT.
          # GITHUB_TOKEN-created merges may not retrigger downstream deploy
          # workflows because of GitHub anti-recursion. DEPLOY_PAT preserves
          # daejong-page T-260610-14 behavior; absent PAT falls back safely.
          owner="${GH_REPO%/*}"
          repo="${GH_REPO#*/}"

          mergeable="UNKNOWN"
          for _attempt in 1 2 3 4 5 6; do
            mergeable="$(gh pr view "$PR_NUMBER" --repo "$GH_REPO" --json mergeable --jq '.mergeable')"
            [ "$mergeable" != "UNKNOWN" ] && break
            sleep 2
          done
          if [ "$mergeable" != "MERGEABLE" ]; then
            existing="$(gh pr view "$PR_NUMBER" --repo "$GH_REPO" --json comments \
              --jq '[.comments[].body] | map(select(contains("mergeable=") and contains("게이트=T-260627-24"))) | length')"
            if [ "$existing" = "0" ]; then
              gh pr comment "$PR_NUMBER" --repo "$GH_REPO" \
                --body "⚠️ mergeable=${mergeable} — auto-merge 보류. 충돌 해결 또는 base 최신화 후 다시 라벨/커밋 이벤트를 발생시키세요. 게이트=T-260627-24."
            fi
            exit 0
          fi

          auto_allowed="$(gh api graphql \
            -f owner="$owner" \
            -f name="$repo" \
            -f query='query($owner:String!, $name:String!) { repository(owner:$owner, name:$name) { autoMergeAllowed } }' \
            --jq '.data.repository.autoMergeAllowed')"

          if [ "$auto_allowed" = "true" ]; then
            gh pr merge "$PR_NUMBER" \
              --squash \
              --delete-branch \
              --auto \
              --repo "$GH_REPO"
          else
            gh pr merge "$PR_NUMBER" \
              --squash \
              --delete-branch \
              --repo "$GH_REPO"
          fi

# 노드 prefix PR 자동 머지 워크플로우
#
# 설계 원칙 (2026-05-24 형님 ack):
# - Claude API 호출 0 — anthropic action 사용 X, 순수 GitHub Actions 룰 기반.
#   이유: 2026-06-15 Anthropic 빌링 분리에서 "Claude Code GitHub Action" 은
#   별도 monthly credit pool 잡아먹지만, 본 워크플로우는 anthropic action
#   호출 0 이라 그 카테고리에서 빠짐.
# - 노드 prefix (wsl/macmini/desktop/notebook/mac) + not draft + no-auto-merge
#   label 없을 때만 GitHub native auto-merge enable.
# - GitHub native auto-merge = checks pass + mergeable 상태되면 자동 squash merge.
# - 회수 = PR 에 `no-auto-merge` label 박거나 yml 파일 삭제하면 즉시 해제 (가역).

name: Auto-merge node-prefix PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.draft == false &&
      (startsWith(github.event.pull_request.head.ref, 'wsl/') ||
       startsWith(github.event.pull_request.head.ref, 'macmini/') ||
       startsWith(github.event.pull_request.head.ref, 'desktop/') ||
       startsWith(github.event.pull_request.head.ref, 'notebook/') ||
       startsWith(github.event.pull_request.head.ref, 'mac/')) &&
      !contains(github.event.pull_request.labels.*.name, 'no-auto-merge')
    steps:
      # ⚠️ 제거 금지 (DO NOT REMOVE) — 디자인/스타일 PR 시각검증 게이트 (T-260610-14)
      # daejong-page 디자인/CSS/SVG PR 은 시각검증(폰 세로뷰포트) 전 auto-merge 금지.
      # 근거: 2026-06-10 PR #188(page-dark.css 톤통일)이 본진 시각검증 게이트보다
      #   CI auto-merge 가 먼저 머지한 거버넌스 갭. 컨벤션(draft 로 올리자)은 까먹으면
      #   무력 → CI 게이트로 강제(형님 지시 "훅으로 강제"). 일반 콘텐츠(.md 등)는 기존 auto-merge 유지.
      - name: Detect design/style files
        id: design
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          files=$(gh pr diff ${{ github.event.pull_request.number }} --name-only --repo ${{ github.repository }})
          if echo "$files" | grep -qiE '\.(css|svg|scss)$|^public/.*\.html$'; then
            echo "design=true" >> "$GITHUB_OUTPUT"
          else
            echo "design=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Flag design PR for visual review (skip auto-merge)
        if: steps.design.outputs.design == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} \
            --body "🎨 디자인/스타일 파일(.css/.svg/.scss) 변경 감지 — auto-merge 보류. 폰 세로뷰포트(390px) 시각검증 통과 후 수동 머지(\`gh pr merge --squash\`). 게이트=T-260610-14."
      # ⚠️ 제거 금지 (DO NOT REMOVE) — merge 는 DEPLOY_PAT(유저 PAT)로 (T-260610-14 deploy 자매갭 fix)
      # GITHUB_TOKEN 으로 머지하면 그 push 가 deploy.yml(on:push main)을 재트리거 못 함(GitHub
      #   anti-recursion) → 노드 PR 자동머지돼도 라이브 미반영 사고('apps 첫이름 적용 안 됨'의 진짜 원인).
      # 유저 PAT 로 머지하면 push 가 유저 attributed → deploy.yml 정상 트리거. 회수=secret 삭제 시
      #   GITHUB_TOKEN 으로 폴백(머지는 되나 deploy 수동). PAT scope=repo+workflow.
      - name: Enable auto-merge (squash)
        if: steps.design.outputs.design != 'true'
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_PAT }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --delete-branch \
            --auto \
            --repo ${{ github.repository }}
      # ⚠️ 제거 금지 끝

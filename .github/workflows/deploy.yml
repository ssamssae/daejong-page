# Astro → GitHub Pages 배포 (P4)
# 2026-06-09 P4 라이브 전환 완료(build_type=workflow, work.kangdaejong.com=Astro 라이브) →
#   on: push(main) 활성: 콘텐츠(worklog/insight/knowhow 등) main 푸시 시 자동 빌드·배포.
#   (옛 DORMANT workflow_dispatch-only 는 codex-mesh-vote 승자 C 플립 보류 단계용이었고, P4 flip 으로 해제.)
# Node 22.12+ 필수 (Astro 6 가 Node 20 거부).
name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

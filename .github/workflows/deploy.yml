# Astro → GitHub Pages 배포 (P4)
# ⚠️ DORMANT — on: workflow_dispatch 만 (push 트리거 X). codex-mesh-vote 승자 C(플립 보류) 준수:
#   라이브 소스 전환은 (1) 아키 A/B 스코프 픽 + public/ 자산 이전 완료 (2) Pages build_type=workflow 전환
#   둘 다 끝난 뒤에만. 그 전엔 수동 dispatch 해도 Pages source 가 legacy 라 무효(이중 안전).
# Node 22.12+ 필수 (Astro 6 가 Node 20 거부).
name: Deploy Astro to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

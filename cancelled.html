<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보류·취소 - 강대종</title>
  <meta name="description" content="포기했거나 보류한 할일의 무덤 — 날짜순 기록.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      padding: 32px 16px 80px;
      line-height: 1.7;
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 0 8px; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #2a2a2a;
    }
    header h1 { font-size: 22px; color: #ffd54f; font-weight: 700; }
    header a { color: #9e9e9e; text-decoration: none; font-size: 14px; }
    header a:hover { color: #ffd54f; }

    .intro {
      font-size: 13px; color: #9e9e9e;
      margin-bottom: 20px; padding: 12px 14px;
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px;
      line-height: 1.55;
    }

    .hero-stats {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      margin-bottom: 24px;
    }
    .hero-card {
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px;
      padding: 14px 16px;
    }
    .hero-card-label {
      font-size: 11px; color: #9e9e9e; margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .hero-card-value { font-size: 22px; color: #e0e0e0; font-weight: 700; }
    .hero-card-value .unit {
      font-size: 13px; color: #9e9e9e; font-weight: 500; margin-left: 4px;
    }
    .hero-card-sub { font-size: 11px; color: #666; margin-top: 4px; }

    .timeline { display: flex; flex-direction: column; gap: 22px; }

    .date-group {
      display: flex; flex-direction: column; gap: 10px;
    }
    .date-head {
      display: flex; align-items: baseline; gap: 10px;
      padding-bottom: 8px; border-bottom: 1px dashed #2a2a2a;
    }
    .date-label {
      font-size: 15px; color: #ffd54f; font-weight: 700;
    }
    .date-rel {
      font-size: 12px; color: #9e9e9e;
    }
    .date-count {
      margin-left: auto; font-size: 11px; color: #666;
    }

    .date-group.empty-day .date-label { color: #6a6a6a; }
    .date-group.empty-day .date-count { color: #555; }
    .empty-day-note {
      font-size: 12px; color: #555;
      padding: 8px 14px;
      background: #141414; border: 1px dashed #2a2a2a;
      border-radius: 10px;
    }

    .cancelled-item {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 12px; padding: 14px 16px;
      opacity: 0.9;
    }
    .cancelled-item:hover { border-color: #3a3a3a; }

    .item-head {
      display: flex; align-items: flex-start; gap: 10px; margin-bottom: 6px;
    }
    .item-icon {
      flex-shrink: 0; width: 20px; height: 20px; border-radius: 5px;
      border: 1.5px solid #666; margin-top: 2px;
      display: flex; align-items: center; justify-content: center;
      background: #222;
    }
    .item-icon::after {
      content: '✕'; color: #9e9e9e; font-size: 11px; font-weight: bold;
    }
    .item-title {
      flex: 1; font-size: 14px; color: #9e9e9e;
      text-decoration: line-through;
      text-decoration-color: #666;
      line-height: 1.5;
      word-break: keep-all; overflow-wrap: break-word;
    }
    .item-reason {
      font-size: 13px; color: #aaa;
      line-height: 1.6;
      padding-left: 30px;
      word-break: keep-all; overflow-wrap: break-word;
    }
    .item-reason-label {
      display: inline-block; font-size: 10px; color: #ffab91;
      background: rgba(255, 171, 145, 0.1);
      border: 1px solid rgba(255, 171, 145, 0.3);
      padding: 1px 8px; border-radius: 6px; font-weight: 600;
      letter-spacing: 0.3px; margin-right: 8px; vertical-align: 1px;
    }

    .empty {
      color: #666; text-align: center; padding: 60px 20px; font-size: 14px;
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px;
    }
    .empty-emoji { font-size: 32px; margin-bottom: 12px; opacity: 0.5; }
    .loading { color: #666; text-align: center; padding: 40px 0; font-size: 14px; font-style: italic; }
    .error { color: #ef5350; text-align: center; padding: 40px 0; font-size: 14px; }

    .back {
      display: inline-block; margin-top: 28px; color: #9e9e9e;
      text-decoration: none; font-size: 14px;
    }
    .back:hover { color: #ffd54f; }

    @media (max-width: 480px) {
      .hero-stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>보류·취소</h1>
      <a href="./todos.html">진행중 할일 →</a>
    </header>

    <div class="intro">
      포기하거나 보류한 할일의 무덤입니다. 날짜순으로 정리되어 있어요.
      <div style="margin-top:8px;font-size:12px;color:#9e9e9e;">
        이슈/포스트모템 기록은 <a href="./issues.html" style="color:#ffd54f;text-decoration:none;">이슈 페이지</a>로 이동했습니다.
      </div>
    </div>

    <div id="view">
      <div class="loading">불러오는 중…</div>
    </div>

    <a class="back" href="./">← 홈으로 돌아가기</a>
  </div>

  <script>
    const viewEl = document.getElementById('view');

    function parseDate(s) {
      const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!m) return null;
      return new Date(+m[1], +m[2] - 1, +m[3]);
    }

    function todayKST() {
      const now = new Date();
      const kst = new Date(now.getTime() + (now.getTimezoneOffset() + 540) * 60000);
      kst.setHours(0, 0, 0, 0);
      return kst;
    }

    function relativeDay(dateStr) {
      const d = parseDate(dateStr);
      if (!d) return '';
      const diff = Math.round((todayKST() - d) / 86400000);
      if (diff === 0) return '오늘';
      if (diff === 1) return '어제';
      if (diff < 7) return diff + '일 전';
      if (diff < 30) return Math.floor(diff / 7) + '주 전';
      if (diff < 365) return Math.floor(diff / 30) + '달 전';
      return Math.floor(diff / 365) + '년 전';
    }

    function escapeHtml(s) {
      return (s || '').replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    // Parse the 보류/취소 section of todos.md
    function parseCancelled(md) {
      const items = [];
      let inSection = false;
      for (const line of md.split('\n')) {
        const trimmed = line.trim();
        if (/^## 보류|^## 취소/.test(trimmed)) { inSection = true; continue; }
        if (/^#/.test(trimmed)) { inSection = false; continue; }
        if (!inSection) continue;
        if (!/^- \[/.test(trimmed)) continue;

        // Strip the checkbox
        let content = trimmed.replace(/^- \[.\]\s*/, '');

        // Extract title: between ~~ ... ~~  OR if no ~~, everything up to first (취소:
        let title = '';
        const mStrike = content.match(/^~~(.+?)~~/);
        if (mStrike) {
          title = mStrike[1].trim();
          content = content.slice(mStrike[0].length).trim();
        } else {
          const mFirst = content.match(/^(.+?)\s*\(취소:/);
          if (mFirst) {
            title = mFirst[1].trim();
          } else {
            title = content;
          }
        }

        // Extract cancel date
        let cancelDate = '';
        const mDate = content.match(/\(취소:\s*(\d{4}-\d{2}-\d{2})\)/);
        if (mDate) {
          cancelDate = mDate[1];
          content = content.replace(mDate[0], '').trim();
        }

        // What's left should be the reason (after dash)
        let reason = content.replace(/^[—\-–:]\s*/, '').trim();

        items.push({ title, cancelDate, reason });
      }
      return items;
    }

    async function init() {
      try {
        const idxRes = await fetch('./todos/index.json?_=' + Date.now());
        const idxData = await idxRes.json();
        const entries = (idxData.entries || idxData.versions || [])
          .slice().sort((a, b) => b.date.localeCompare(a.date));
        if (entries.length === 0) {
          viewEl.innerHTML = renderEmpty();
          return;
        }
        const latest = entries[0];
        const mdRes = await fetch('./todos/' + latest.file + '?_=' + Date.now());
        const md = await mdRes.text();
        const items = parseCancelled(md);
        render(items);
      } catch (e) {
        viewEl.innerHTML = '<div class="error">데이터를 불러오지 못했습니다.</div>';
      }
    }

    function renderEmpty() {
      return '' +
        '<div class="empty">' +
        '<div class="empty-emoji">🗂</div>' +
        '<div>아직 보류·취소한 할일이 없습니다.</div>' +
        '<div style="font-size:12px;color:#555;margin-top:6px;">모든 할일을 붙잡고 있는 중.</div>' +
        '</div>';
    }

    function render(items) {
      if (items.length === 0) {
        viewEl.innerHTML = renderEmpty();
        return;
      }

      // Group by cancel date
      const groups = {};
      for (const it of items) {
        const key = it.cancelDate || '날짜없음';
        if (!groups[key]) groups[key] = [];
        groups[key].push(it);
      }
      const sortedDates = Object.keys(groups).sort((a, b) => b.localeCompare(a));

      // Stats
      const total = items.length;
      const mostRecent = sortedDates.find(d => d !== '날짜없음') || null;

      let html = '';
      html += '<div class="hero-stats">';
      html +=
        '<div class="hero-card">' +
        '<div class="hero-card-label">누적 취소</div>' +
        '<div class="hero-card-value">' + total + '<span class="unit">건</span></div>' +
        '<div class="hero-card-sub">' + sortedDates.length + '일에 걸쳐</div>' +
        '</div>';
      if (mostRecent) {
        html +=
          '<div class="hero-card">' +
          '<div class="hero-card-label">최근 취소</div>' +
          '<div class="hero-card-value" style="font-size:16px;">' + relativeDay(mostRecent) + '</div>' +
          '<div class="hero-card-sub">' + mostRecent + '</div>' +
          '</div>';
      } else {
        html +=
          '<div class="hero-card">' +
          '<div class="hero-card-label">최근 취소</div>' +
          '<div class="hero-card-value" style="font-size:16px;">—</div>' +
          '<div class="hero-card-sub">날짜 정보 없음</div>' +
          '</div>';
      }
      html += '</div>';

      // Build full date range (프로젝트 시작일 ~ today) so gap days render as "없음"
      // Use UTC-anchored iteration to avoid local-TZ drift (KST pushed everything -1 day before).
      // 프로젝트 시작일(2026-04-11) 기준으로 iterate — 첫 취소 이전 날짜도 "없음" 으로 노출
      const PROJECT_START = '2026-04-11';
      const datedOnly = sortedDates.filter(d => d !== '날짜없음');
      const timelineDates = [];
      {
        const earliestCancel = datedOnly.length > 0 ? datedOnly[datedOnly.length - 1] : PROJECT_START;
        const earliest = earliestCancel < PROJECT_START ? earliestCancel : PROJECT_START;
        // Use KST "today" (homepage is a KST-only site)
        const nowKst = new Date(Date.now() + 9 * 3600 * 1000);
        const todayStr = nowKst.toISOString().slice(0, 10);
        const latestCancel = datedOnly.length > 0 ? datedOnly[0] : PROJECT_START;
        const endStr = todayStr >= latestCancel ? todayStr : latestCancel;
        const cur = new Date(earliest + 'T00:00:00Z');
        const end = new Date(endStr + 'T00:00:00Z');
        while (cur <= end) {
          timelineDates.push(cur.toISOString().slice(0, 10));
          cur.setUTCDate(cur.getUTCDate() + 1);
        }
        timelineDates.reverse(); // newest first
      }
      // Append 날짜없음 group last if any
      if (groups['날짜없음']) timelineDates.push('날짜없음');

      html += '<div class="timeline">';
      for (const date of timelineDates) {
        const group = groups[date] || [];
        const dateLabel = (date === '날짜없음') ? '날짜 미상' : date;
        const rel = (date === '날짜없음') ? '' : relativeDay(date);
        const isEmpty = group.length === 0;
        html += '<div class="date-group' + (isEmpty ? ' empty-day' : '') + '">';
        html +=
          '<div class="date-head">' +
          '<span class="date-label">' + dateLabel + '</span>' +
          (rel ? '<span class="date-rel">· ' + rel + '</span>' : '') +
          '<span class="date-count">' + (isEmpty ? '없음' : group.length + '건') + '</span>' +
          '</div>';
        if (isEmpty) {
          html += '<div class="empty-day-note">이 날 취소·보류한 할일 없음</div>';
        } else {
          for (const it of group) {
            html += '<div class="cancelled-item">';
            html +=
              '<div class="item-head">' +
              '<div class="item-icon"></div>' +
              '<div class="item-title">' + escapeHtml(it.title) + '</div>' +
              '</div>';
            if (it.reason) {
              html +=
                '<div class="item-reason">' +
                '<span class="item-reason-label">사유</span>' +
                escapeHtml(it.reason) +
                '</div>';
            }
            html += '</div>';
          }
        }
        html += '</div>';
      }
      html += '</div>';

      viewEl.innerHTML = html;
    }

    init();
  </script>
</body>
</html>

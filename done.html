<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>완료 - 강대종</title>
  <meta name="description" content="강대종이 매일 실제로 완료한 것들의 체크리스트.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      padding: 32px 16px 80px;
      line-height: 1.7;
    }
    .wrap { max-width: 1200px; margin: 0 auto; }
    .main-layout {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }
    .sidebar {
      width: 300px;
      min-width: 300px;
      max-height: calc(100vh - 140px);
      overflow-y: auto;
      position: sticky;
      top: 32px;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    .sidebar::-webkit-scrollbar-thumb:hover { background: #555; }
    .content-area { flex: 1; min-width: 0; }
    @media (max-width: 768px) {
      .main-layout { flex-direction: column; }
      .sidebar {
        width: 100%;
        min-width: unset;
        max-height: 240px;
        position: static;
      }
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid #2a2a2a;
    }
    header h1 { font-size: 22px; color: #ffd54f; font-weight: 700; }
    header a { color: #9e9e9e; text-decoration: none; font-size: 14px; }
    header a:hover { color: #ffd54f; }
    .entry-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .entry-list li {
      background: #1e1e1e;
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.2s;
      border: 1px solid #2a2a2a;
    }
    .entry-list li:hover { background: #262626; }
    .entry-list li.active {
      background: #2a2515;
      border-color: #ffd54f;
    }
    .entry-date {
      font-size: 15px;
      color: #e0e0e0;
      font-weight: 600;
      font-family: "SF Mono", Menlo, Consolas, monospace;
    }
    .entry-count {
      font-size: 11px;
      color: #ffd54f;
      background: #2a2515;
      padding: 2px 8px;
      border-radius: 10px;
      display: inline-block;
      margin-left: 8px;
    }
    .entry-summary {
      font-size: 12px;
      color: #9e9e9e;
      margin-top: 4px;
    }
    .content {
      background: #1e1e1e;
      border-radius: 16px;
      padding: 32px 28px;
      min-height: 200px;
    }
    .content:empty::before {
      content: "왼쪽 목록에서 날짜를 선택해주세요.";
      color: #666;
    }
    .content h1 {
      font-size: 20px;
      color: #ffd54f;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid #2a2a2a;
    }
    .content h2 {
      font-size: 15px;
      color: #ffd54f;
      margin: 20px 0 8px;
      font-weight: 600;
    }
    .content h2:first-of-type { margin-top: 0; }
    .content ul {
      list-style: none;
      padding-left: 0;
      margin-bottom: 4px;
    }
    .content li {
      padding: 3px 0 3px 26px;
      position: relative;
      color: #c0c0c0;
      font-size: 14px;
      line-height: 1.6;
    }
    .content li::before {
      content: "✓";
      position: absolute;
      left: 4px;
      top: 3px;
      color: #4caf50;
      font-weight: 700;
    }
    .back {
      display: inline-block;
      margin-top: 24px;
      color: #9e9e9e;
      text-decoration: none;
      font-size: 14px;
    }
    .back:hover { color: #ffd54f; }
    .loading { color: #666; font-style: italic; }
    .error { color: #ef5350; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>완료</h1>
      <a href="./">← 홈으로</a>
    </header>
    <div class="main-layout">
      <div class="sidebar">
        <ul class="entry-list" id="entries"></ul>
      </div>
      <div class="content-area">
        <div class="content" id="content"></div>
        <a class="back" href="./">← 홈으로 돌아가기</a>
      </div>
    </div>
  </div>
  <script>
    const entriesEl = document.getElementById('entries');
    const contentEl = document.getElementById('content');
    let activeLi = null;

    async function loadIndex() {
      try {
        const res = await fetch('./done/index.json?_=' + Date.now());
        const data = await res.json();
        renderList(data.entries || []);
      } catch (e) {
        entriesEl.innerHTML = '<li class="error">인덱스를 불러오지 못했습니다.</li>';
      }
    }

    function renderList(entries) {
      entries.sort((a, b) => b.date.localeCompare(a.date));
      entriesEl.innerHTML = '';
      for (const e of entries) {
        const li = document.createElement('li');
        li.innerHTML =
          '<div><span class="entry-date">' + e.date + '</span>' +
          (e.count != null ? '<span class="entry-count">' + e.count + '건</span>' : '') +
          '</div>' +
          (e.summary ? '<div class="entry-summary">' + escapeHtml(e.summary) + '</div>' : '');
        li.addEventListener('click', () => loadEntry(e, li));
        entriesEl.appendChild(li);
      }
      if (entries.length > 0) {
        const first = entriesEl.firstChild;
        loadEntry(entries[0], first);
      }
    }

    async function loadEntry(entry, li) {
      if (activeLi) activeLi.classList.remove('active');
      li.classList.add('active');
      activeLi = li;
      contentEl.innerHTML = '<span class="loading">불러오는 중…</span>';
      try {
        const res = await fetch('./done/' + entry.file + '?_=' + Date.now());
        const text = await res.text();
        contentEl.innerHTML = mdToHtml(text);
      } catch (e) {
        contentEl.innerHTML = '<span class="error">파일을 불러오지 못했습니다.</span>';
      }
    }

    function mdToHtml(md) {
      const lines = md.split(/\r?\n/);
      const out = [];
      let inList = false;
      const closeList = () => { if (inList) { out.push('</ul>'); inList = false; } };
      for (const raw of lines) {
        const line = raw.trim();
        if (!line) continue;
        if (line.startsWith('# ')) {
          closeList();
          out.push('<h1>' + escapeHtml(line.slice(2).trim()) + '</h1>');
        } else if (line.startsWith('## ')) {
          closeList();
          out.push('<h2>' + escapeHtml(line.slice(3).trim()) + '</h2>');
        } else if (line.startsWith('- [x] ') || line.startsWith('- [ ] ')) {
          if (!inList) { out.push('<ul>'); inList = true; }
          out.push('<li>' + escapeHtml(line.slice(6).trim()) + '</li>');
        } else if (line.startsWith('- ')) {
          if (!inList) { out.push('<ul>'); inList = true; }
          out.push('<li>' + escapeHtml(line.slice(2).trim()) + '</li>');
        } else {
          closeList();
          out.push('<p>' + escapeHtml(line) + '</p>');
        }
      }
      closeList();
      return out.join('');
    }

    function escapeHtml(s) {
      return (s || '').replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    loadIndex();
  </script>
</body>
</html>

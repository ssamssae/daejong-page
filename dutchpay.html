<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>더치페이 계산기 - 강대종</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      padding: 32px 16px 80px;
      line-height: 1.7;
    }
    .wrap { max-width: 480px; margin: 0 auto; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #2a2a2a;
    }
    header h1 { font-size: 20px; color: #ffd54f; font-weight: 700; }
    header a { color: #9e9e9e; text-decoration: none; font-size: 14px; }
    header a:hover { color: #ffd54f; }
    .section {
      background: #1e1e1e; border-radius: 16px; padding: 20px;
      margin-bottom: 16px; border: 1px solid #2a2a2a;
    }
    .section-title {
      font-size: 14px; color: #ffd54f; font-weight: 600; margin-bottom: 12px;
    }
    label { display: block; font-size: 13px; color: #999; margin-bottom: 4px; }
    input, select {
      width: 100%; padding: 12px 14px; background: #2a2a2a; border: 1px solid #3a3a3a;
      border-radius: 10px; color: #e0e0e0; font-size: 16px; margin-bottom: 12px;
      outline: none; transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: #ffd54f; }
    input[type="number"] { -moz-appearance: textfield; }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .person-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .person-row input { margin-bottom: 0; }
    .person-name { flex: 1; }
    .person-amount { width: 120px; }
    .btn-remove {
      width: 32px; height: 32px; border-radius: 50%; border: 1px solid #555;
      background: transparent; color: #ef5350; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .btn-remove:hover { background: #ef5350; color: #fff; border-color: #ef5350; }
    .btn-add {
      width: 100%; padding: 10px; background: transparent; border: 1px dashed #555;
      border-radius: 10px; color: #999; font-size: 14px; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-add:hover { border-color: #ffd54f; color: #ffd54f; }
    .btn-calc {
      width: 100%; padding: 14px; background: #ffd54f; color: #1e1e1e;
      border: none; border-radius: 14px; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: background 0.2s, transform 0.2s;
    }
    .btn-calc:hover { background: #ffca28; transform: translateY(-1px); }
    .btn-calc:active { transform: translateY(0); }
    .result {
      background: #1e1e1e; border-radius: 16px; padding: 20px;
      border: 1px solid #ffd54f; margin-bottom: 16px; display: none;
    }
    .result-title {
      font-size: 14px; color: #ffd54f; font-weight: 600; margin-bottom: 12px;
    }
    .result-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid #2a2a2a;
    }
    .result-item:last-child { border-bottom: none; }
    .result-name { font-size: 15px; color: #e0e0e0; }
    .result-amount { font-size: 16px; font-weight: 700; color: #ffd54f; }
    .result-total {
      margin-top: 12px; padding-top: 12px; border-top: 1px solid #3a3a3a;
      display: flex; justify-content: space-between; font-size: 14px; color: #999;
    }
    .btn-share {
      width: 100%; padding: 12px; background: transparent; border: 2px solid #ffd54f;
      border-radius: 14px; color: #ffd54f; font-size: 14px; font-weight: 600;
      cursor: pointer; margin-top: 12px; transition: all 0.2s;
    }
    .btn-share:hover { background: #ffd54f; color: #1e1e1e; }
    .mode-tabs {
      display: flex; gap: 8px; margin-bottom: 16px;
    }
    .mode-tab {
      flex: 1; padding: 10px; background: #2a2a2a; border: 1px solid #3a3a3a;
      border-radius: 10px; color: #999; font-size: 13px; font-weight: 600;
      cursor: pointer; text-align: center; transition: all 0.2s;
    }
    .mode-tab.active { background: #2a2515; border-color: #ffd54f; color: #ffd54f; }
    .back { display: inline-block; margin-top: 24px; color: #9e9e9e; text-decoration: none; font-size: 14px; }
    .back:hover { color: #ffd54f; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>더치페이 계산기</h1>
      <a href="./portfolio.html">← 포트폴리오</a>
    </header>

    <div class="mode-tabs">
      <div class="mode-tab active" onclick="setMode('equal')">균등 분할</div>
      <div class="mode-tab" onclick="setMode('custom')">개별 금액</div>
    </div>

    <div class="section">
      <div class="section-title">총 금액</div>
      <label>결제 금액 (원)</label>
      <input type="number" id="totalAmount" placeholder="예: 50000" inputmode="numeric">
    </div>

    <div class="section">
      <div class="section-title">참여자</div>
      <div id="personList"></div>
      <button class="btn-add" onclick="addPerson()">+ 참여자 추가</button>
    </div>

    <button class="btn-calc" onclick="calculate()">계산하기</button>

    <div class="result" id="result">
      <div class="result-title">정산 결과</div>
      <div id="resultList"></div>
      <div class="result-total">
        <span>합계</span>
        <span id="resultTotal"></span>
      </div>
      <button class="btn-share" onclick="shareResult()">결과 복사하기</button>
    </div>

    <a class="back" href="./">← 홈으로 돌아가기</a>
  </div>

  <script>
    let mode = 'equal';
    let persons = [];
    let personId = 0;

    function setMode(m) {
      mode = m;
      document.querySelectorAll('.mode-tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && m === 'equal') || (i === 1 && m === 'custom'));
      });
      renderPersons();
    }

    function addPerson() {
      persons.push({ id: ++personId, name: '', amount: 0 });
      renderPersons();
    }

    function removePerson(id) {
      persons = persons.filter(p => p.id !== id);
      renderPersons();
    }

    function renderPersons() {
      const list = document.getElementById('personList');
      list.innerHTML = '';
      for (const p of persons) {
        const row = document.createElement('div');
        row.className = 'person-row';
        row.innerHTML =
          '<input class="person-name" type="text" placeholder="이름" value="' + esc(p.name) + '" ' +
          'oninput="updatePerson(' + p.id + ',\'name\',this.value)">' +
          (mode === 'custom'
            ? '<input class="person-amount" type="number" placeholder="금액" inputmode="numeric" value="' + (p.amount || '') + '" ' +
              'oninput="updatePerson(' + p.id + ',\'amount\',this.value)">'
            : '') +
          '<button class="btn-remove" onclick="removePerson(' + p.id + ')">x</button>';
        list.appendChild(row);
      }
    }

    function updatePerson(id, field, val) {
      const p = persons.find(x => x.id === id);
      if (p) p[field] = field === 'amount' ? Number(val) : val;
    }

    function calculate() {
      const total = Number(document.getElementById('totalAmount').value);
      if (!total || persons.length === 0) return;

      const resultEl = document.getElementById('result');
      const listEl = document.getElementById('resultList');
      const totalEl = document.getElementById('resultTotal');
      listEl.innerHTML = '';

      let results = [];
      if (mode === 'equal') {
        const each = Math.round(total / persons.length);
        const remainder = total - each * persons.length;
        results = persons.map((p, i) => ({
          name: p.name || '참여자 ' + (i + 1),
          amount: each + (i === 0 ? remainder : 0)
        }));
      } else {
        const customTotal = persons.reduce((s, p) => s + (p.amount || 0), 0);
        const remaining = total - customTotal;
        const unset = persons.filter(p => !p.amount).length;
        results = persons.map((p, i) => ({
          name: p.name || '참여자 ' + (i + 1),
          amount: p.amount || (unset > 0 ? Math.round(remaining / unset) : 0)
        }));
      }

      let sum = 0;
      for (const r of results) {
        sum += r.amount;
        const item = document.createElement('div');
        item.className = 'result-item';
        item.innerHTML = '<span class="result-name">' + esc(r.name) + '</span>' +
          '<span class="result-amount">' + r.amount.toLocaleString() + '원</span>';
        listEl.appendChild(item);
      }
      totalEl.textContent = sum.toLocaleString() + '원';
      resultEl.style.display = 'block';
      resultEl.scrollIntoView({ behavior: 'smooth' });
    }

    function shareResult() {
      const items = document.querySelectorAll('.result-item');
      let text = '더치페이 정산 결과\n';
      items.forEach(item => {
        const name = item.querySelector('.result-name').textContent;
        const amount = item.querySelector('.result-amount').textContent;
        text += name + ': ' + amount + '\n';
      });
      text += '합계: ' + document.getElementById('resultTotal').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.btn-share');
        btn.textContent = '복사 완료!';
        setTimeout(() => btn.textContent = '결과 복사하기', 2000);
      });
    }

    function esc(s) { return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    // 초기 3명
    addPerson(); addPerson(); addPerson();
  </script>
</body>
</html>

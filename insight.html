<body>
  <div class="wrap">
    <header>
      <h1>인사이트 상세</h1>
      <a href="./insights.html">← 인사이트 목록</a>
    </header>

    <div id="view">
      <div class="loading">불러오는 중…</div>
    </div>

    <a class="back" href="./insights.html">← 인사이트 목록</a>
  </div>

  <script>
    const viewEl = document.getElementById('view');

    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function escapeHtml(s) {
      return (s || '').replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function parseInsightMd(md) {
      const frontmatter = {};
      if (md.startsWith('---')) {
        const end = md.indexOf('\n---', 3);
        if (end > 0) {
          const fmBlock = md.slice(3, end);
          for (const fl of fmBlock.split('\n')) {
            const m = fl.match(/^([A-Za-z_][A-Za-z0-9_]*)\s*:\s*(.*?)\s*$/);
            if (m) {
              let val = m[2];
              if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1, -1);
              if (val.startsWith('[') && val.endsWith(']')) {
                val = val.slice(1, -1).split(',').map(t => t.trim().replace(/^['"]|['"]$/g, '')).filter(Boolean);
              }
              frontmatter[m[1]] = val;
            }
          }
          md = md.slice(end + 4).trimStart();
        }
      }
      const lines = md.split('\n');
      let title = '';
      const bodyBuf = [];
      let titleSeen = false;
      for (const raw of lines) {
        const line = raw.replace(/\r$/, '');
        if (!titleSeen && line.trim().startsWith('# ') && !line.trim().startsWith('## ')) {
          title = line.trim().slice(2).trim();
          titleSeen = true;
          continue;
        }
        bodyBuf.push(line);
      }
      return { title, frontmatter, body: bodyBuf.join('\n').trim() };
    }

    function srcBadgeClass(type) {
      const map = {
        video: 'badge-src-video', book: 'badge-src-book',
        podcast: 'badge-src-podcast', article: 'badge-src-article',
        talk: 'badge-src-talk', paper: 'badge-src-paper'
      };
      return map[type] || 'badge-tag';
    }
    function srcLabel(type) {
      const map = {
        video: '영상', book: '책', podcast: '팟캐스트',
        article: '아티클', talk: '토크', paper: '논문'
      };
      return map[type] || type || '기타';
    }

    function injectArticleJsonLd(entry) {
      const script = document.createElement('script');
      script.type = 'application/ld+json';
      script.textContent = JSON.stringify({
        '@context': 'https://schema.org',
        '@type': 'Article',
        headline: entry.title,
        datePublished: entry.date,
        author: {
          '@type': 'Person',
          name: '강대종'
        },
        publisher: {
          '@type': 'Organization',
          name: '강대종',
          url: 'https://work.kangdaejong.com'
        },
        mainEntityOfPage: window.location.href,
        inLanguage: 'ko'
      });
      document.head.appendChild(script);
    }

    function renderBody(text) {
      if (!text) return '';
      const lines = text.split('\n');
      const out = [];
      let listBuf = [];
      let listType = null;
      let codeBuf = [];
      let inCode = false;
      let codeLang = '';
      let quoteBuf = [];

      const flushList = () => {
        if (listBuf.length) {
          const tag = listType === 'ol' ? 'ol' : 'ul';
          out.push('<' + tag + '>');
          for (const it of listBuf) out.push('<li>' + inline(it) + '</li>');
          out.push('</' + tag + '>');
          listBuf = [];
          listType = null;
        }
      };
      const flushCode = () => {
        if (codeBuf.length) {
          out.push('<pre><code>' + escapeHtml(codeBuf.join('\n')) + '</code></pre>');
          codeBuf = [];
        }
      };
      const flushQuote = () => {
        if (quoteBuf.length) {
          out.push('<blockquote>' + quoteBuf.map(q => '<p>' + inline(q) + '</p>').join('') + '</blockquote>');
          quoteBuf = [];
        }
      };

      const inline = (s) => {
        let x = escapeHtml(s);
        x = x.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
        x = x.replace(/(^|[^"'>])((?:https?):\/\/[^\s<]+)/g, '$1<a href="$2" target="_blank" rel="noreferrer">$2</a>');
        x = x.replace(/`([^`]+)`/g, '<code>$1</code>');
        x = x.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        return x;
      };

      for (const rawLine of lines) {
        const line = rawLine.replace(/\s+$/, '');

        if (/^```/.test(line)) {
          if (inCode) {
            flushCode();
            inCode = false;
            codeLang = '';
          } else {
            flushList();
            flushQuote();
            inCode = true;
            codeLang = line.replace(/^```/, '').trim();
          }
          continue;
        }
        if (inCode) { codeBuf.push(rawLine); continue; }

        if (/^\s*>\s?/.test(line)) {
          flushList();
          quoteBuf.push(line.replace(/^\s*>\s?/, ''));
          continue;
        }
        flushQuote();

        if (/^---+\s*$/.test(line)) {
          flushList();
          out.push('<hr>');
          continue;
        }

        const h4 = line.match(/^####\s+(.*)$/);
        if (h4) { flushList(); out.push('<h4>' + inline(h4[1]) + '</h4>'); continue; }
        const h3 = line.match(/^###\s+(.*)$/);
        if (h3) { flushList(); out.push('<h3>' + inline(h3[1]) + '</h3>'); continue; }
        const h2 = line.match(/^##\s+(.*)$/);
        if (h2) { flushList(); out.push('<h2>' + inline(h2[1]) + '</h2>'); continue; }

        const ordered = line.match(/^\s*\d+\.\s+(.*)$/);
        if (ordered) {
          if (listType && listType !== 'ol') flushList();
          listType = 'ol';
          listBuf.push(ordered[1]);
          continue;
        }
        if (/^\s*-\s+/.test(line)) {
          if (listType && listType !== 'ul') flushList();
          listType = 'ul';
          listBuf.push(line.replace(/^\s*-\s+/, ''));
          continue;
        }
        flushList();
        if (line === '') { out.push(''); continue; }
        out.push('<p>' + inline(line) + '</p>');
      }
      flushList();
      flushCode();
      flushQuote();
      return out.join('\n');
    }

    async function init() {
      const slug = getQueryParam('slug');
      const date = getQueryParam('date');
      if (!slug) {
        viewEl.innerHTML = '<div class="error">slug 파라미터가 없습니다. <a href="./insights.html">인사이트 목록</a>에서 항목을 선택해 주세요.</div>';
        return;
      }
      try {
        const idxRes = await fetch('./insights/index.json?_=' + Date.now());
        const idxData = await idxRes.json();
        const entries = idxData.entries || [];
        const entry = entries.find(e => e.slug === slug && (!date || e.date === date));
        if (!entry) {
          viewEl.innerHTML = '<div class="error">해당 인사이트를 찾을 수 없습니다. (slug: ' + escapeHtml(slug) + ')</div>';
          return;
        }
        const r = await fetch('./insights/' + entry.file + '?_=' + Date.now());
        if (!r.ok) {
          viewEl.innerHTML = '<div class="error">인사이트 파일을 불러올 수 없습니다.</div>';
          return;
        }
        const md = await r.text();
        const parsed = parseInsightMd(md);
        render(entry, parsed);
        injectArticleJsonLd(entry);
        document.title = (parsed.title || entry.title || '인사이트 상세') + ' - 강대종';
      } catch (e) {
        viewEl.innerHTML = '<div class="error">데이터를 불러오지 못했습니다.</div>';
      }
    }

    function render(entry, parsed) {
      const fm = parsed.frontmatter || {};
      const title = parsed.title || entry.title || fm.source_title || '(제목 없음)';
      const srcType = fm.source_type || entry.source_type || '';
      const tags = Array.isArray(fm.tags) ? fm.tags : (fm.tags ? [fm.tags] : []);
      const date = entry.date || fm.consumed_at || '';

      let html = '';
      html += '<div class="detail-head">';
      if (date) html += '<div class="detail-date">' + escapeHtml(date) + '</div>';
      html += '<div class="detail-title">' + escapeHtml(title) + '</div>';
      html += '<div class="badges">';
      if (srcType) html += '<span class="badge ' + srcBadgeClass(srcType) + '">' + escapeHtml(srcLabel(srcType)) + '</span>';
      for (const t of tags) html += '<span class="badge badge-tag">#' + escapeHtml(t) + '</span>';
      html += '</div>';
      html += '</div>';

      const rows = [];
      if (fm.source_author) rows.push(['저자', escapeHtml(fm.source_author)]);
      if (fm.source_channel && fm.source_channel !== fm.source_author) rows.push(['채널', escapeHtml(fm.source_channel)]);
      if (fm.source_duration) rows.push(['길이', escapeHtml(fm.source_duration)]);
      if (fm.source_published) rows.push(['발행', escapeHtml(fm.source_published)]);
      if (fm.consumed_at) rows.push(['시청/소비', escapeHtml(fm.consumed_at)]);
      if (fm.source_url) rows.push(['원본', '<a href="' + escapeHtml(fm.source_url) + '" target="_blank" rel="noopener">' + escapeHtml(fm.source_url) + ' ↗</a>']);
      if (rows.length) {
        html += '<dl class="meta-grid">';
        for (const [k, v] of rows) {
          html += '<dt>' + escapeHtml(k) + '</dt><dd>' + v + '</dd>';
        }
        html += '</dl>';
      }

      html += '<div class="body">' + renderBody(parsed.body || '') + '</div>';

      viewEl.innerHTML = html;
    }

    init();
  </script>
</body>

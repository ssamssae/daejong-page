      <stop offset="0%" style="stop-color:#ffca28"/>
      <stop offset="100%" style="stop-color:#ffd54f"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#nlBg)"/>

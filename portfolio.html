<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>포트폴리오 - 강대종</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      overflow-y: scroll;
      scrollbar-gutter: stable;
    }
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      padding: 32px 16px 80px;
      line-height: 1.7;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid #2a2a2a;
    }
    header h1 {
      font-size: 22px;
      color: #ffd54f;
      font-weight: 700;
    }
    header a {
      color: #9e9e9e;
      text-decoration: none;
      font-size: 14px;
    }
    header a:hover { color: #ffd54f; }
    .intro {
      color: #9e9e9e;
      font-size: 14px;
      margin-bottom: 24px;
      padding: 16px 20px;
      background: #1a1a1a;
      border-radius: 12px;
      border-left: 3px solid #ffd54f;
    }
    .main-layout {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }
    .sidebar {
      width: 300px;
      min-width: 300px;
      max-height: calc(100vh - 200px);
      overflow-y: auto;
      position: sticky;
      top: 32px;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    .sidebar::-webkit-scrollbar-thumb:hover { background: #555; }
    .project-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .project-list li {
      background: #1e1e1e;
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: background 0.2s;
      border: 1px solid #2a2a2a;
    }
    .project-list li:hover { background: #262626; }
    .project-list li.active {
      background: #2a2515;
      border-color: #ffd54f;
    }
    .project-icon {
      font-size: 20px;
      margin-right: 8px;
      display: inline-flex;
      align-items: center;
      vertical-align: middle;
    }
    .project-icon img {
      width: 24px;
      height: 24px;
      border-radius: 5px;
    }
    .project-name {
      font-size: 15px;
      color: #e0e0e0;
      font-weight: 600;
      display: inline;
    }
    .project-status {
      font-size: 11px;
      color: #9e9e9e;
      margin-top: 4px;
      letter-spacing: 0.3px;
    }
    .content-area {
      flex: 1;
      min-width: 0;
    }
    .detail {
      background: #1e1e1e;
      border-radius: 16px;
      padding: 32px 28px;
      min-height: 300px;
    }
    .detail:empty::before {
      content: "왼쪽 목록에서 프로젝트를 선택해주세요.";
      color: #666;
    }
    .detail .d-icon {
      font-size: 48px;
      margin-bottom: 16px;
      line-height: 1;
    }
    .detail .d-icon img {
      width: 64px;
      height: 64px;
      border-radius: 14px;
    }
    .detail .d-name {
      font-size: 22px;
      font-weight: 700;
      color: #ffd54f;
      margin-bottom: 8px;
    }
    .detail .d-status {
      font-size: 13px;
      color: #9e9e9e;
      margin-bottom: 20px;
      letter-spacing: 0.3px;
    }
    .detail .d-desc {
      font-size: 15px;
      color: #c0c0c0;
      margin-bottom: 24px;
      line-height: 1.8;
    }
    .detail .d-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .detail .d-links a {
      font-size: 13px;
      color: #ffd54f;
      text-decoration: none;
      padding: 8px 16px;
      border: 1px solid #ffd54f;
      border-radius: 14px;
      transition: background 0.2s, color 0.2s;
    }
    .detail .d-links a:hover {
      background: #ffd54f;
      color: #1e1e1e;
    }
    .back {
      display: inline-block;
      margin-top: 24px;
      color: #9e9e9e;
      text-decoration: none;
      font-size: 14px;
    }
    .back:hover { color: #ffd54f; }
    /* Timeline inline styles */
    .tl-intro {
      color: #9e9e9e; font-size: 14px; margin-bottom: 24px; padding: 14px 18px;
      background: #161616; border-radius: 10px; border-left: 3px solid #ffd54f;
    }
    .tl-stats {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
      margin-bottom: 24px;
    }
    .tl-stat {
      background: #161616; border-radius: 10px; padding: 14px; text-align: center;
      border: 1px solid #2a2a2a;
    }
    .tl-stat-num { font-size: 26px; font-weight: 700; color: #ffd54f; }
    .tl-stat-label { font-size: 11px; color: #999; margin-top: 4px; }
    .tl-timeline { position: relative; padding-left: 32px; }
    .tl-timeline::before {
      content: ''; position: absolute; left: 11px; top: 8px; bottom: 8px;
      width: 2px; background: #2a2a2a;
    }
    .tl-event {
      position: relative; margin-bottom: 22px;
      opacity: 0; transform: translateY(16px);
      animation: tlFadeUp 0.4s ease forwards;
    }
    @keyframes tlFadeUp { to { opacity: 1; transform: translateY(0); } }
    .tl-dot {
      position: absolute; left: -32px; top: 6px;
      width: 20px; height: 20px; border-radius: 50%;
      background: #2a2515; border: 2px solid #ffd54f;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; z-index: 1;
    }
    .tl-dot.major { background: #ffd54f; }
    .tl-event-date { font-size: 12px; color: #ffd54f; font-weight: 600; margin-bottom: 3px; }
    .tl-event-title { font-size: 15px; color: #e0e0e0; font-weight: 700; margin-bottom: 5px; }
    .tl-event-desc { font-size: 13px; color: #999; margin-bottom: 6px; }
    .tl-tags { display: flex; gap: 5px; flex-wrap: wrap; }
    .tl-tag {
      font-size: 10px; padding: 2px 8px; border-radius: 8px;
      background: #2a2a2a; color: #aaa; border: 1px solid #3a3a3a;
    }
    /* Signup form styles */
    .signup-form { margin-top: 24px; max-width: 420px; }
    .signup-form .form-row {
      display: flex; gap: 8px; margin-bottom: 12px;
    }
    .signup-form input[type="email"] {
      flex: 1; min-width: 0; padding: 11px 14px; border-radius: 10px;
      border: 1px solid #333; background: #161616; color: #e0e0e0;
      font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .signup-form input[type="email"]:focus { border-color: #ffd54f; }
    .signup-form input[type="email"]::placeholder { color: #666; }
    .signup-form .signup-btn {
      padding: 11px 18px; border-radius: 10px; border: none;
      background: #ffd54f; color: #1e1e1e; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.2s;
      white-space: nowrap;
    }
    .signup-form .signup-btn:hover { background: #ffca28; transform: translateY(-1px); }
    .signup-form .signup-btn:disabled { background: #555; color: #999; cursor: not-allowed; transform: none; }
    .signup-msg {
      font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-top: 8px;
    }
    .signup-msg.success { background: #1b3a1b; color: #81c784; }
    .signup-msg.error { background: #3a1b1b; color: #ef5350; }
    .signup-count {
      font-size: 12px; color: #666; margin-top: 12px;
    }
    .tl-tag.flutter { border-color: #4fc3f7; color: #4fc3f7; }
    .tl-tag.ai { border-color: #ffd54f; color: #ffd54f; }
    .tl-tag.web { border-color: #81c784; color: #81c784; }
    .tl-tag.infra { border-color: #ce93d8; color: #ce93d8; }
    .hero {
      background: linear-gradient(135deg, #1f1f1f 0%, #1a1a1a 100%);
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 36px 32px;
      margin-bottom: 32px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255, 213, 79, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      color: #1e1e1e;
      background: #ffd54f;
      padding: 4px 10px;
      border-radius: 12px;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
      position: relative;
      z-index: 1;
    }
    .hero-main {
      display: flex;
      gap: 28px;
      align-items: flex-start;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }
    .hero-icon {
      width: 96px;
      height: 96px;
      border-radius: 20px;
      flex-shrink: 0;
    }
    .hero-info {
      flex: 1;
      min-width: 240px;
    }
    .hero-name {
      font-size: 28px;
      font-weight: 700;
      color: #ffd54f;
      margin-bottom: 8px;
    }
    .hero-status {
      font-size: 13px;
      color: #9e9e9e;
      margin-bottom: 16px;
    }
    .hero-desc {
      font-size: 15px;
      color: #c0c0c0;
      line-height: 1.7;
      margin-bottom: 22px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .p-card {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 20px;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .p-card-head {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .p-card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      flex-shrink: 0;
    }
    .p-card-title {
      font-size: 16px;
      font-weight: 600;
      color: #e0e0e0;
    }
    .p-card-status {
      font-size: 11px;
      color: #9e9e9e;
      letter-spacing: 0.3px;
      margin-top: 2px;
    }
    .p-card-desc {
      font-size: 13px;
      color: #999;
      line-height: 1.6;
      flex: 1;
    }
    .p-card-head-wrap {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .p-badge {
      font-size: 10px;
      font-weight: 600;
      color: #1e1e1e;
      background: #ffd54f;
      padding: 3px 8px;
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.3px;
    }
    .p-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .p-btn {
      font-size: 12px;
      color: #ffd54f;
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid #ffd54f;
      border-radius: 10px;
      transition: background 0.15s, color 0.15s;
      font-weight: 500;
    }
    .p-btn:hover {
      background: #ffd54f;
      color: #1e1e1e;
    }
    .p-btn.disabled {
      color: #666;
      border-color: #333;
      background: transparent;
      cursor: default;
      pointer-events: none;
    }
    @media (max-width: 640px) {
      .hero { padding: 28px 20px; }
      .hero-name { font-size: 24px; }
      .hero-icon { width: 72px; height: 72px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>포트폴리오</h1>
      <a href="./">← 홈으로</a>
    </header>

    <div class="hero" id="hero"></div>
    <div class="grid" id="grid"></div>
    <a class="back" href="./">← 홈으로 돌아가기</a>
  </div>

  <script>
    const projects = [
      {
        iconImg: './timeline_icon.svg',
        name: '개발 타임라인',
        status: '웹 프로젝트',
        desc: 'AI와 함께한 개발 여정을 주간 히트맵·마일스톤·이벤트 타임라인으로 정리했습니다.',
        actions: [{ label: '타임라인 열기 →', url: './timeline.html' }]
      },
      {
        iconImg: './yakmukja_icon.png',
        name: '약먹자',
        status: '개발중',
        desc: '복약 시간을 놓치지 않게 도와주는 알림 앱.',
        actions: [{ label: '개발중', disabled: true }]
      },
      {
        iconImg: './dutchpay_icon.png',
        name: '더치페이 계산기',
        status: '개발중',
        desc: '여러 명이 먹은 자리를 편하게 나눠 내는 정산 도우미.',
        actions: [{ label: '개발중', disabled: true }]
      },
      {
        iconImg: './homepage_icon.svg',
        name: '홈페이지 제작',
        status: '운영중 · GitHub Pages',
        badge: '지금 여기',
        desc: '다크테마 기반 개인 포트폴리오 & 개발 기록 페이지. HTML/CSS/JS만으로 제작, Claude Code 스킬 시스템과 연동됩니다.',
        actions: [
          { label: 'GitHub ↗', url: 'https://github.com/ssamssae/daejong-page', external: true },
          { label: '현재 페이지', disabled: true }
        ]
      },
      {
        icon: '',
        iconImg: './memo_icon.png',
        name: '메모요',
        status: 'iOS TestFlight / Android 비공개 테스트 중',
        desc: '심플한 다크테마 메모 앱. 복수 선택 삭제를 지원하는 가벼운 메모 도구입니다.',
        links: [],
        showSignup: true
      }
    ];

    const heroEl = document.getElementById('hero');
    const gridEl = document.getElementById('grid');

    function renderActions(actions) {
      if (!actions || actions.length === 0) return '';
      var items = actions.map(function(a) {
        if (a.disabled) return '<span class="p-btn disabled">' + a.label + '</span>';
        var target = a.external ? ' target="_blank" rel="noopener"' : '';
        return '<a class="p-btn" href="' + a.url + '"' + target + '>' + a.label + '</a>';
      }).join('');
      return '<div class="p-actions">' + items + '</div>';
    }

    function renderHero(p) {
      var iconHtml = p.iconImg
        ? '<img class="hero-icon" src="' + p.iconImg + '?v=6" alt="' + p.name + '">'
        : '<div class="hero-icon">' + p.icon + '</div>';
      var signupHtml = '';
      if (p.showSignup) {
        signupHtml =
          '<div class="signup-form">' +
            '<div style="font-size:15px;font-weight:600;color:#ffd54f;margin-bottom:10px;">Android 사전예약</div>' +
            '<div style="font-size:13px;color:#999;margin-bottom:12px;">이메일을 등록하시면 베타 테스트 참여 안내를 보내드립니다.</div>' +
            '<div class="form-row">' +
              '<input type="email" id="signupEmail" placeholder="이메일 주소를 입력하세요" onkeydown="if(event.key===\'Enter\'){event.preventDefault();submitSignup();}">' +
              '<button class="signup-btn" id="signupBtn" onclick="submitSignup()">사전예약</button>' +
            '</div>' +
            '<div id="signupMsg"></div>' +
            '<div class="signup-count" id="signupCount"></div>' +
          '</div>';
      }
      heroEl.innerHTML =
        '<div class="hero-badge">지금 진행 중 · 출시 임박</div>' +
        '<div class="hero-main">' +
          iconHtml +
          '<div class="hero-info">' +
            '<div class="hero-name">' + p.name + '</div>' +
            '<div class="hero-status">' + p.status + '</div>' +
            '<div class="hero-desc">' + p.desc + '</div>' +
            signupHtml +
          '</div>' +
        '</div>';
      if (p.showSignup) setTimeout(loadSignupCount, 100);
    }

    function renderGrid(list) {
      var html = '';
      for (var i = 0; i < list.length; i++) {
        var p = list[i];
        var iconHtml = p.iconImg
          ? '<img class="p-card-icon" src="' + p.iconImg + '?v=6" alt="' + p.name + '">'
          : '<div class="p-card-icon">' + (p.icon || '') + '</div>';
        var badgeHtml = p.badge ? '<span class="p-badge">' + p.badge + '</span>' : '';
        html +=
          '<div class="p-card">' +
            '<div class="p-card-head-wrap">' +
              '<div class="p-card-head">' +
                iconHtml +
                '<div>' +
                  '<div class="p-card-title">' + p.name + '</div>' +
                  '<div class="p-card-status">' + p.status + '</div>' +
                '</div>' +
              '</div>' +
              badgeHtml +
            '</div>' +
            '<div class="p-card-desc">' + p.desc + '</div>' +
            renderActions(p.actions) +
          '</div>';
      }
      gridEl.innerHTML = html;
    }

    function renderPortfolio() {
      var featured = projects.find(function(p) { return p.showSignup; }) || projects[projects.length - 1];
      var others = projects.filter(function(p) { return p !== featured; });
      renderHero(featured);
      renderGrid(others);
    }

    function showDetail(p, li) {
      if (activeLi) activeLi.classList.remove('active');
      li.classList.add('active');
      activeLi = li;

      if (p.customHtml) {
        renderTimeline();
        return;
      }

      var dIconHtml = p.iconImg
        ? '<img src="' + p.iconImg + '?v=6" alt="' + p.name + '">'
        : p.icon;
      var html =
        '<div class="d-icon">' + dIconHtml + '</div>' +
        '<div class="d-name">' + p.name + '</div>' +
        '<div class="d-status">' + p.status + '</div>' +
        '<div class="d-desc">' + p.desc + '</div>';

      if (p.links.length > 0) {
        html += '<div class="d-links">' + p.links.map(l =>
          '<a href="' + l.url + '"' + (l.url.startsWith('http') ? ' target="_blank" rel="noopener"' : '') + '>' + l.label + '</a>'
        ).join('') + '</div>';
      }

      if (p.showSignup) {
        html += '<div class="signup-form">' +
          '<div style="font-size:16px;font-weight:600;color:#ffd54f;margin-bottom:12px;">Android 사전예약</div>' +
          '<div style="font-size:13px;color:#999;margin-bottom:14px;">이메일을 등록하시면 베타 테스트 참여 안내를 보내드립니다.</div>' +
          '<div class="form-row">' +
            '<input type="email" id="signupEmail" placeholder="이메일 주소를 입력하세요" onkeydown="if(event.key===\'Enter\'){event.preventDefault();submitSignup();}">' +
            '<button class="signup-btn" id="signupBtn" onclick="submitSignup()">사전예약</button>' +
          '</div>' +
          '<div id="signupMsg"></div>' +
          '<div class="signup-count" id="signupCount"></div>' +
        '</div>';
        // 등록 수 로드
        setTimeout(loadSignupCount, 100);
      }

      detailEl.innerHTML = html;
    }

    function renderTimeline() {
      var events = [
        { date: '2026.04.11', title: '첫 번째 코드, 메모요 탄생', desc: 'AI(Claude)와 대화하며 Flutter로 첫 앱을 만들기 시작했다. 다크테마 메모 앱 "메모요"가 태어난 날.', tags: [['flutter','Flutter'],['ai','Claude AI']], major: 1 },
        { date: '2026.04.11', title: '개인 홈페이지 오픈', desc: 'daejong-page v1.0.0 배포. 다크 카드 UI의 개인 소개 페이지를 GitHub Pages에 올렸다.', tags: [['web','HTML/CSS/JS'],['','GitHub Pages']] },
        { date: '2026.04.12', title: '4개 앱 병렬 개발 시작', desc: '메모요 크래시를 잡으면서 더치페이 계산기, 약먹자, 고독사방지 앱을 동시에 시작했다.', tags: [['flutter','Flutter'],['','멀티 프로젝트']] },
        { date: '2026.04.13', title: '약먹자 초기 커밋', desc: '복약 알림 앱 "약먹자" 저장소 생성. Claude Code 채널스(텔레그램 연동) 리서치도 진행.', tags: [['flutter','Flutter'],['infra','텔레그램 봇']] },
        { date: '2026.04.14', title: '메모요 UI 리디자인', desc: '메모요 전체 UI를 갈아엎었다. 텔레그램 봇 연동으로 모바일에서 원격 개발 가능해짐.', tags: [['flutter','Flutter'],['infra','텔레그램 봇']] },
        { date: '2026.04.15', title: '메모요 출시 준비 돌입', desc: '패키지명 변경, UIPasteControl 이식, 메타데이터 작성, 1024 아이콘 생성, IPA 빌드를 하루에 끝냈다.', tags: [['flutter','Flutter'],['','iOS'],['','Android'],['web','홈페이지 v1.2.0']], major: 2 },
        { date: '2026.04.15', title: '자동화 인프라 구축', desc: '작업일지 자동 생성 스킬, 할일 관리 스킬, 사이드프로젝트 브리핑 스킬 등 Claude Code 스킬 시스템을 대폭 정비했다.', tags: [['ai','Claude Code'],['infra','자동화']] },
        { date: '2026.04.15', title: 'Apple App Store 심사 제출', desc: '메모요 iOS 버전을 App Store Connect에 제출했다. TestFlight 배포 중.', tags: [['','App Store'],['','iOS']] },
        { date: '2026.04.16', title: 'Google Play 비공개 테스트 제출', desc: '앱 설정 11/11 완료, 카테고리 "생산성" 선택, 비공개 테스트 버전을 Google에 검토 제출했다.', tags: [['','Google Play'],['','Android'],['','베타 테스트']], major: 3 },
        { date: '2026.04.16', title: '홈페이지 v1.3.0 + 웹 프로젝트', desc: '할일 목록 페이지, 카카오톡 오픈채팅 버튼 추가. 더치페이 웹 계산기와 타임라인 페이지도 새로 만들었다.', tags: [['web','HTML/CSS/JS'],['','포트폴리오']] }
      ];

      var start = new Date('2026-04-11');
      var now = new Date();
      var days = Math.floor((now - start) / (1000 * 60 * 60 * 24)) + 1;

      var html = '<div class="tl-stats">';
      html += '<div class="tl-stat"><div class="tl-stat-num" id="tlDayCount">0</div><div class="tl-stat-label">개발 일수</div></div>';
      html += '<div class="tl-stat"><div class="tl-stat-num">5</div><div class="tl-stat-label">프로젝트</div></div>';
      html += '<div class="tl-stat"><div class="tl-stat-num">2</div><div class="tl-stat-label">출시 준비</div></div>';
      html += '</div>';
      html += '<div class="tl-timeline">';
      for (var i = 0; i < events.length; i++) {
        var ev = events[i];
        var delay = (i * 0.1) + 's';
        html += '<div class="tl-event" style="animation-delay:' + delay + '">';
        html += '<div class="tl-dot' + (ev.major ? ' major' : '') + '">' + (ev.major ? '<span>' + ev.major + '</span>' : '') + '</div>';
        html += '<div class="tl-event-date">' + ev.date + '</div>';
        html += '<div class="tl-event-title">' + ev.title + '</div>';
        html += '<div class="tl-event-desc">' + ev.desc + '</div>';
        html += '<div class="tl-tags">';
        for (var j = 0; j < ev.tags.length; j++) {
          html += '<span class="tl-tag ' + ev.tags[j][0] + '">' + ev.tags[j][1] + '</span>';
        }
        html += '</div></div>';
      }
      html += '</div>';
      detailEl.innerHTML = html;

      // Animate day counter
      var el = document.getElementById('tlDayCount');
      if (el) {
        var count = 0;
        var iv = setInterval(function() {
          count++;
          el.textContent = count;
          if (count >= days) clearInterval(iv);
        }, 80);
      }
    }

    // ===== 사전예약 폼 =====
    // Apps Script 웹앱 URL (배포 후 여기에 입력)
    const SIGNUP_API = 'https://script.google.com/macros/s/AKfycbzAdwQvLm5c3veXrm-OnZ3hAwYqxq0gBnhxgk9TFmFRtrjPmKTd56SCa6Nf-zZaX3lDGA/exec';

    async function submitSignup() {
      var emailInput = document.getElementById('signupEmail');
      var btn = document.getElementById('signupBtn');
      var msgEl = document.getElementById('signupMsg');
      var email = emailInput.value.trim();

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        msgEl.className = 'signup-msg error';
        msgEl.textContent = '유효한 이메일 주소를 입력해주세요.';
        return;
      }

      btn.disabled = true;
      btn.textContent = '등록 중...';
      msgEl.className = '';
      msgEl.textContent = '';

      try {
        var res = await fetch(SIGNUP_API, {
          method: 'POST',
          body: JSON.stringify({ email: email }),
          redirect: 'follow'
        });
        var text = await res.text();
        var data;
        try { data = JSON.parse(text); } catch(e) { data = null; }

        if (data && data.success) {
          msgEl.className = 'signup-msg success';
          msgEl.textContent = data.message || '사전예약이 완료되었습니다! 이메일을 확인해주세요.';
          emailInput.value = '';
        } else if (data && data.error) {
          msgEl.className = 'signup-msg error';
          msgEl.textContent = data.error;
        } else {
          // Apps Script 리다이렉트 후 응답이 HTML일 수 있음 - 등록은 성공했을 가능성 높음
          msgEl.className = 'signup-msg success';
          msgEl.textContent = '사전예약이 완료되었습니다! 이메일을 확인해주세요.';
          emailInput.value = '';
        }
      } catch (err) {
        // CORS/리다이렉트 에러여도 서버에서 처리됐을 수 있음
        msgEl.className = 'signup-msg success';
        msgEl.textContent = '사전예약 요청을 보냈습니다! 이메일을 확인해주세요.';
        emailInput.value = '';
      }

      btn.disabled = false;
      btn.textContent = '사전예약';
    }

    async function loadSignupCount() {
      try {
        var res = await fetch(SIGNUP_API);
        var data = await res.json();
        var el = document.getElementById('signupCount');
        if (el && data.count > 0) {
          el.textContent = '현재 ' + data.count + '명이 사전예약했습니다.';
        }
      } catch(e) {}
    }

    renderPortfolio();
  </script>

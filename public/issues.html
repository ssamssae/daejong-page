  <script>
    const viewEl = document.getElementById('view');

    function parseDate(s) {
      const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!m) return null;
      return new Date(+m[1], +m[2] - 1, +m[3]);
    }
    function todayKST() {
      const now = new Date();
      const kst = new Date(now.getTime() + (now.getTimezoneOffset() + 540) * 60000);
      kst.setHours(0, 0, 0, 0);
      return kst;
    }
    function relativeDay(dateStr) {
      const d = parseDate(dateStr);
      if (!d) return '';
      const diff = Math.round((todayKST() - d) / 86400000);
      if (diff === 0) return '오늘';
      if (diff === 1) return '어제';
      if (diff < 7) return diff + '일 전';
      if (diff < 30) return Math.floor(diff / 7) + '주 전';
      if (diff < 365) return Math.floor(diff / 30) + '달 전';
      return Math.floor(diff / 365) + '년 전';
    }
    function escapeHtml(s) {
      return (s || '').replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    // Parse a full issue markdown file into sections.
    // Returns { title, meta:{occurred,resolved,severity,recurrence,scope},
    //   sections: {증상, 원인, 조치, 예방, 재발이력} }
    function parseIssueMd(md) {
      // Parse + strip YAML frontmatter if present (one-line key:value only)
      const frontmatter = {};
      if (md.startsWith('---')) {
        const end = md.indexOf('\n---', 3);
        if (end > 0) {
          const fmBlock = md.slice(3, end);
          for (const fl of fmBlock.split('\n')) {
            const m = fl.match(/^([A-Za-z_][A-Za-z0-9_]*)\s*:\s*"?(.*?)"?\s*$/);
            if (m) frontmatter[m[1]] = m[2];
          }
          md = md.slice(end + 4).trimStart();
        }
      }
      const lines = md.split('\n');
      let title = '';
      const meta = {};
      const sections = {};
      let currentSection = null;
      const bodyBuf = [];

      const flushSection = () => {
        if (currentSection !== null) {
          sections[currentSection] = bodyBuf.join('\n').trim();
          bodyBuf.length = 0;
        }
      };

      for (const raw of lines) {
        const line = raw.replace(/\r$/, '');
        const trimmed = line.trim();

        if (!title && trimmed.startsWith('# ')) {
          title = trimmed.slice(2).trim();
          continue;
        }

        // Meta bullets (- **Key:** value)
        const metaMatch = trimmed.match(/^-\s*\*\*(.+?):\*\*\s*(.+)$/);
        if (metaMatch && currentSection === null) {
          const key = metaMatch[1].trim();
          const val = metaMatch[2].trim();
          if (key.includes('발생')) meta.occurred = val;
          else if (key.includes('해결')) meta.resolved = val;
          else if (key.includes('심각')) meta.severity = val;
          else if (key.includes('재발')) meta.recurrence = val;
          else if (key.includes('영향')) meta.scope = val;
          continue;
        }

        // Section headings (## 증상 / ## 원인 / ...)
        if (trimmed.startsWith('## ')) {
          flushSection();
          const rawLabel = trimmed.slice(3).trim();
          // Strip trailing parenthetical notes (e.g., "예방 (Forcing function 우선)")
          const key = rawLabel.replace(/\s*\(.*?\)\s*$/, '').replace(/\s+/g, '');
          currentSection = key;
          continue;
        }

        if (currentSection !== null) {
          bodyBuf.push(line);
        }
      }
      flushSection();
      return { title, meta, sections, frontmatter };
    }

    // Minimal inline-markdown rendering for section bodies:
    // - bold **x**, inline `code`, list items, line breaks. No external links escape.
    function renderBody(text) {
      if (!text) return '';
      const lines = text.split('\n');
      const out = [];
      let listBuf = [];
      const flushList = () => {
        if (listBuf.length) {
          out.push('<ul>' + listBuf.map(l => '<li>' + inline(l) + '</li>').join('') + '</ul>');
          listBuf = [];
        }
      };
      const inline = (s) => {
        let x = escapeHtml(s);
        x = x.replace(/`([^`]+)`/g, '<code>$1</code>');
        x = x.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        return x;
      };
      for (const rawLine of lines) {
        const line = rawLine.replace(/\s+$/, '');
        if (/^\s*-\s+/.test(line)) {
          listBuf.push(line.replace(/^\s*-\s+/, ''));
          continue;
        }
        flushList();
        if (line === '') { out.push(''); continue; }
        out.push(inline(line));
      }
      flushList();
      // Join with linebreaks for non-list text
      return out.map(seg => seg.startsWith('<ul>') ? seg : seg).join('\n').replace(/\n\n+/g, '\n\n');
    }

    function sevBadgeClass(sev) {
      if (!sev) return 'badge-rec';
      if (/high/i.test(sev)) return 'badge-sev-high';
      if (/medium/i.test(sev)) return 'badge-sev-medium';
      if (/low/i.test(sev)) return 'badge-sev-low';
      return 'badge-rec';
    }

    async function init() {
      try {
        const idxRes = await fetch('./issues/index.json?_=' + Date.now());
        const idxData = await idxRes.json();
        const entries = (idxData.entries || [])
          .slice()
          .sort((a, b) => {
            if (a.date !== b.date) return b.date.localeCompare(a.date);
            return (a.slug || '').localeCompare(b.slug || '');
          });

        if (entries.length === 0) {
          viewEl.innerHTML = renderEmpty();
          return;
        }

        const loaded = await Promise.all(entries.map(async e => {
          try {
            const r = await fetch('./issues/' + e.file + '?_=' + Date.now());
            const md = await r.text();
            return { ...e, parsed: parseIssueMd(md) };
          } catch (err) {
            return { ...e, parsed: null };
          }
        }));

        render(loaded);
      } catch (e) {
        viewEl.innerHTML = '<div class="error">데이터를 불러오지 못했습니다.</div>';
      }
    }

    function renderEmpty() {
      return '' +
        '<div class="empty">' +
        '<div class="empty-emoji">🧯</div>' +
        '<div>기록된 이슈가 없습니다.</div>' +
        '<div style="font-size:12px;color: var(--fg-mute);margin-top:6px;">문제가 생기면 /issue 로 남겨둡시다.</div>' +
        '</div>';
    }

    function render(items) {
      // Group by date
      const groups = {};
      for (const it of items) {
        const key = it.date || '날짜없음';
        if (!groups[key]) groups[key] = [];
        groups[key].push(it);
      }
      const sortedDates = Object.keys(groups).sort((a, b) => b.localeCompare(a));

      // Stats
      const total = items.length;
      const highCount = items.filter(it => /high/i.test(it.severity || '')).length;
      const recurHigh = items.filter(it => /high/i.test(it.recurrence || '')).length;

      let html = '';
      html += '<div class="hero-stats">';
      html +=
        '<div class="hero-card">' +
        '<div class="hero-card-label">누적 이슈</div>' +
        '<div class="hero-card-value">' + total + '<span class="unit">건</span></div>' +
        '<div class="hero-card-sub">' + sortedDates.length + '일에 걸쳐</div>' +
        '</div>';
      html +=
        '<div class="hero-card">' +
        '<div class="hero-card-label">심각도 high</div>' +
        '<div class="hero-card-value">' + highCount + '<span class="unit">건</span></div>' +
        '<div class="hero-card-sub">전체의 ' + (total ? Math.round(highCount / total * 100) : 0) + '%</div>' +
        '</div>';
      html +=
        '<div class="hero-card">' +
        '<div class="hero-card-label">재발 가능성 high</div>' +
        '<div class="hero-card-value">' + recurHigh + '<span class="unit">건</span></div>' +
        '<div class="hero-card-sub">Forcing Function 필요</div>' +
        '</div>';
      html += '</div>';

      // Build full date range (PROJECT_START ~ today KST) so empty days render as "없음".
      // UTC anchor iteration to avoid local-TZ drift.
      const PROJECT_START = '2026-04-11';
      const datedOnly = sortedDates.filter(d => d !== '날짜없음');
      const timelineDates = [];
      {
        const earliestWithIssue = datedOnly.length > 0 ? datedOnly[datedOnly.length - 1] : PROJECT_START;
        const earliest = earliestWithIssue < PROJECT_START ? earliestWithIssue : PROJECT_START;
        const nowKst = new Date(Date.now() + 9 * 3600 * 1000);
        const todayStr = nowKst.toISOString().slice(0, 10);
        const latestWithIssue = datedOnly.length > 0 ? datedOnly[0] : PROJECT_START;
        const endStr = todayStr >= latestWithIssue ? todayStr : latestWithIssue;
        const cur = new Date(earliest + 'T00:00:00Z');
        const end = new Date(endStr + 'T00:00:00Z');
        while (cur <= end) {
          timelineDates.push(cur.toISOString().slice(0, 10));
          cur.setUTCDate(cur.getUTCDate() + 1);
        }
        timelineDates.reverse();
      }
      if (groups['날짜없음']) timelineDates.push('날짜없음');

      html += '<div class="timeline">';
      for (const date of timelineDates) {
        const group = groups[date] || [];
        const dateLabel = (date === '날짜없음') ? '날짜 미상' : date;
        const rel = (date === '날짜없음') ? '' : relativeDay(date);
        const isEmpty = group.length === 0;
        html += '<div class="date-group' + (isEmpty ? ' empty-day' : '') + '">';
        html +=
          '<div class="date-head">' +
          '<span class="date-label">' + escapeHtml(dateLabel) + '</span>' +
          (rel ? '<span class="date-rel">' + escapeHtml(rel) + '</span>' : '') +
          '<span class="date-count">' + (isEmpty ? '없음' : group.length + '건') + '</span>' +
          '</div>';
        if (isEmpty) {
          html += '<div class="empty-day-note">이 날은 기록된 이슈가 없습니다.</div>';
        } else {
          for (const it of group) {
            html += renderIssueCard(it);
          }
        }
        html += '</div>';
      }
      html += '</div>';

      viewEl.innerHTML = html;
    }

    function renderIssueCard(it) {
      const p = it.parsed || { title: it.title, meta: {}, sections: {} };
      const title = p.title || it.title || '(제목 없음)';
      const meta = p.meta || {};
      const sev = it.severity || meta.severity || '';
      const rec = it.recurrence || meta.recurrence || '';
      const scope = it.scope || meta.scope || '';
      let html = '<div class="issue-card">';
      html += '<div class="issue-head">';
      html += '<div class="issue-title">' + escapeHtml(title) + '</div>';
      html += '<div class="badges">';
      if (sev) html += '<span class="badge ' + sevBadgeClass(sev) + '">심각도 ' + escapeHtml(sev) + '</span>';
      if (rec) html += '<span class="badge badge-rec">재발 ' + escapeHtml(rec) + '</span>';
      html += '</div>';
      html += '</div>';

      const metaBits = [];
      if (meta.occurred) metaBits.push('발생 ' + meta.occurred);
      if (meta.resolved) metaBits.push('해결 ' + meta.resolved);
      if (scope) metaBits.push(scope);
      if (metaBits.length) {
        html += '<div class="meta-line">' +
          metaBits.map(b => '<span>' + escapeHtml(b) + '</span>').join('<span class="sep">·</span>') +
          '</div>';
      }

      const preview = (p.frontmatter && p.frontmatter.summary || p.sections['증상'] || '').replace(/```[\s\S]*?```/g, '').replace(/\n+/g, ' ').trim();
      if (preview) {
        html += '<div class="issue-preview">' + escapeHtml(preview) + '</div>';
      }

      html += '</div>';
      return html;
    }

    init();
  </script>
</body>
</html>

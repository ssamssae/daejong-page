  <div id="tooltip" role="tooltip" aria-hidden="true"></div>

<script>
(function () {
  var tooltip = document.getElementById('tooltip');
  var markers = document.querySelectorAll('.marker-group');
  var pinnedMarker = null; // tap 으로 pin 된 마커

  function showTooltip(marker, clientX, clientY) {
    var name = marker.dataset.name || '';
    var triggers = [];
    try { triggers = JSON.parse(marker.dataset.triggers || '[]'); } catch (e) {}
    var triggersHtml = triggers.map(function (t) {
      return '<span class="tt-trigger">' + escapeHtml(t) + '</span>';
    }).join('');
    tooltip.innerHTML =
      '<div class="tt-name">' + escapeHtml(name) + '</div>' +
      '<div class="tt-triggers">' + triggersHtml + '</div>';
    tooltip.classList.add('visible');
    tooltip.setAttribute('aria-hidden', 'false');
    positionTooltip(clientX, clientY);
  }

  function hideTooltip() {
    tooltip.classList.remove('visible');
    tooltip.setAttribute('aria-hidden', 'true');
    pinnedMarker = null;
  }

  function positionTooltip(clientX, clientY) {
    // 우상단 디폴트, 화면 경계 flip
    var ttRect = tooltip.getBoundingClientRect();
    var pad = 12;
    var x = clientX + pad;
    var y = clientY - ttRect.height - pad;
    if (x + ttRect.width > window.innerWidth - 8) {
      x = clientX - ttRect.width - pad;
    }
    if (y < 8) {
      y = clientY + pad;
    }
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[c];
    });
  }

  markers.forEach(function (m) {
    m.addEventListener('mouseenter', function (e) {
      if (pinnedMarker) return; // pin 중엔 hover 무시
      showTooltip(m, e.clientX, e.clientY);
    });
    m.addEventListener('mousemove', function (e) {
      if (pinnedMarker) return;
      positionTooltip(e.clientX, e.clientY);
    });
    m.addEventListener('mouseleave', function () {
      if (pinnedMarker) return;
      hideTooltip();
    });
    m.addEventListener('click', function (e) {
      e.stopPropagation();
      if (pinnedMarker === m) {
        hideTooltip();
      } else {
        pinnedMarker = m;
        showTooltip(m, e.clientX, e.clientY);
      }
    });
  });

  document.addEventListener('click', function (e) {
    if (pinnedMarker && !e.target.closest('.marker-group')) {
      hideTooltip();
    }
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') hideTooltip();
  });
})();
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>개발 타임라인 - 강대종</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #FFFFFF;
      color: #191F28;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      padding: 32px 16px 80px;
      line-height: 1.7;
    }
    .wrap { max-width: 880px; margin: 0 auto; padding: 0 24px; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid #E5E8EB;
    }
    header h1 { font-size: 20px; color: #3182F6; font-weight: 700; }
    header a { color: #4E5968; text-decoration: none; font-size: 14px; }
    header a:hover { color: #3182F6; }
    .intro {
      color: #4E5968; font-size: 14px; margin-bottom: 32px; padding: 16px 20px;
      background: #F9FAFB; border-radius: 12px; border-left: 3px solid #3182F6;
    }
    .stats {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
      margin-bottom: 28px;
    }
    .stat {
      background: #FFFFFF; border-radius: 12px; padding: 16px 12px; text-align: center;
      border: 1px solid #E5E8EB;
    }
    .stat-num { font-size: 26px; font-weight: 700; color: #3182F6; line-height: 1; }
    .stat-label { font-size: 11px; color: #8B95A1; margin-top: 6px; letter-spacing: 0.3px; }
    @media (max-width: 560px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
    }

    /* Heatmap */
    .heatmap-card {
      background: #F9FAFB; border: 1px solid #E5E8EB; border-radius: 14px;
      padding: 20px 20px 18px; margin-bottom: 28px; overflow-x: auto;
    }
    .heatmap-title {
      font-size: 13px; color: #4E5968; margin-bottom: 14px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .heatmap-title strong { color: #191F28; font-size: 14px; }
    .heatmap {
      display: grid; grid-template-columns: 24px 1fr; gap: 4px;
      min-width: 520px;
    }
    .heatmap-days {
      display: grid; grid-template-rows: repeat(7, 12px); gap: 3px;
      padding-top: 18px;
    }
    .heatmap-day-label {
      font-size: 9px; color: #8B95A1; line-height: 12px; text-align: right; padding-right: 4px;
    }
    .heatmap-grid-wrap {
      display: flex; flex-direction: column;
    }
    .heatmap-months {
      display: flex; font-size: 9px; color: #8B95A1; height: 14px;
      padding-bottom: 4px;
    }
    .heatmap-grid {
      display: grid; grid-auto-flow: column; grid-template-rows: repeat(7, 12px);
      gap: 3px;
    }
    .hm-cell {
      width: 12px; height: 12px; border-radius: 3px; background: #FFFFFF;
      border: 1px solid #F2F4F6; cursor: default;
      transition: transform 0.1s;
    }
    .hm-cell:hover { transform: scale(1.3); border-color: #3182F6; }
    .hm-cell.lv1 { background: #C9DCF7; border-color: #A8C7F0; }
    .hm-cell.lv2 { background: #3182F6; border-color: #1B64DA; }
    .hm-cell.lv3 { background: #1B64DA; border-color: #1B64DA; }
    .hm-cell.lv4 { background: #3182F6; border-color: #5B9BF8; box-shadow: 0 0 6px rgba(49, 130, 246, 0.4); }
    .heatmap-legend {
      display: flex; align-items: center; gap: 6px; font-size: 10px; color: #8B95A1;
      margin-top: 12px; justify-content: flex-end;
    }
    .heatmap-legend .hm-cell { cursor: default; }
    .heatmap-legend .hm-cell:hover { transform: none; }

    /* Milestones (major events highlight) */
    .milestones {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px; margin-bottom: 28px;
    }
    .ms-card {
      background: linear-gradient(135deg, #F9FAFB 0%, #F9FAFB 100%);
      border: 1px solid #C9DCF7; border-radius: 12px;
      padding: 16px; position: relative;
    }
    .ms-num {
      position: absolute; top: 10px; right: 12px;
      font-size: 28px; font-weight: 800; color: #3182F6; opacity: 0.25; line-height: 1;
    }
    .ms-date { font-size: 11px; color: #3182F6; font-weight: 600; margin-bottom: 4px; }
    .ms-title { font-size: 14px; color: #191F28; font-weight: 700; line-height: 1.4; }

    /* Event list */
    .section-title {
      font-size: 14px; color: #191F28; font-weight: 600; margin-bottom: 14px;
      margin-top: 8px;
    }
    .events { display: flex; flex-direction: column; gap: 4px; }
    .event-row {
      display: grid; grid-template-columns: 90px 1fr auto;
      gap: 12px; align-items: center; padding: 10px 14px;
      background: #F9FAFB; border: 1px solid transparent; border-radius: 10px;
      transition: border-color 0.15s, background 0.15s;
    }
    .event-row:hover { border-color: #E5E8EB; background: #FFFFFF; }
    .event-row.major { border-left: 3px solid #3182F6; }
    .er-date { font-size: 11px; color: #4E5968; font-weight: 600; }
    .er-title { font-size: 13px; color: #191F28; line-height: 1.5; }
    .er-title strong { color: #191F28; font-weight: 600; display: block; margin-bottom: 2px; }
    .er-title span { color: #8B95A1; font-size: 12px; }
    .er-tags { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
    .tag {
      font-size: 10px; padding: 2px 7px; border-radius: 8px;
      background: #E5E8EB; color: #4E5968; border: 1px solid #E5E8EB;
    }
    .tag.flutter { border-color: #3182F6; color: #3182F6; }
    .tag.ai { border-color: #3182F6; color: #3182F6; }
    .tag.web { border-color: #22C55E; color: #22C55E; }
    .tag.infra { border-color: #A855F7; color: #A855F7; }
    @media (max-width: 640px) {
      .event-row { grid-template-columns: 70px 1fr; }
      .er-tags { grid-column: 2; justify-content: flex-start; margin-top: 4px; }
    }

    .back { display: inline-block; margin-top: 24px; color: #4E5968; text-decoration: none; font-size: 14px; }
    .back:hover { color: #3182F6; }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>
<body>
  <div class="wrap">
    <header>
      <h1>개발 타임라인</h1>
      <a href="./portfolio.html">← 포트폴리오</a>
    </header>

    <div class="intro">
      2026년 4월, 코딩 한 줄 못 쓰던 85년생이 AI와 함께 개발을 시작했습니다. 이 페이지는 그 여정의 기록입니다.
    </div>

    <div class="stats" id="stats"></div>

    <div class="heatmap-card">
      <div class="heatmap-title">
        <strong>개발 활동 히트맵</strong>
        <span id="activityHint">최근 이벤트 기반</span>
      </div>
      <div class="heatmap">
        <div class="heatmap-days" id="heatmapDays"></div>
        <div class="heatmap-grid-wrap">
          <div class="heatmap-months" id="heatmapMonths"></div>
          <div class="heatmap-grid" id="heatmapGrid"></div>
        </div>
      </div>
      <div class="heatmap-legend">
        <span>Less</span>
        <span class="hm-cell"></span>
        <span class="hm-cell lv1"></span>
        <span class="hm-cell lv2"></span>
        <span class="hm-cell lv3"></span>
        <span class="hm-cell lv4"></span>
        <span>More</span>
      </div>
    </div>

    <div class="section-title">주요 마일스톤</div>
    <div class="milestones" id="milestones"></div>

    <div class="section-title">전체 이벤트</div>
    <div class="events" id="events"></div>

    <a class="back" href="./">← 홈으로 돌아가기</a>
  </div>

  <script>
    const events = [
      { date: '2026-04-11', title: '첫 번째 코드, 메모요 탄생', desc: 'AI(Claude)와 대화하며 Flutter로 첫 앱을 만들기 시작했다.', tags: [['flutter','Flutter'],['ai','Claude AI']], major: 1 },
      { date: '2026-04-11', title: '개인 홈페이지 오픈', desc: 'daejong-page v1.0.0 배포.', tags: [['web','HTML/CSS/JS'],['','GitHub Pages']] },
      { date: '2026-04-12', title: '4개 앱 병렬 개발 시작', desc: '메모요 크래시를 잡으면서 더치페이, 약먹자, 고독사방지 앱 동시 착수.', tags: [['flutter','Flutter'],['','멀티 프로젝트']] },
      { date: '2026-04-13', title: '약먹자 초기 커밋', desc: '복약 알림 앱 저장소 생성. 텔레그램 연동 리서치.', tags: [['flutter','Flutter'],['infra','텔레그램 봇']] },
      { date: '2026-04-14', title: '메모요 UI 리디자인', desc: '전체 UI 리뉴얼. 모바일에서 원격 개발 환경 구축.', tags: [['flutter','Flutter'],['infra','텔레그램 봇']] },
      { date: '2026-04-15', title: '메모요 출시 준비 돌입', desc: '패키지명 변경, UIPasteControl 이식, 메타데이터, 1024 아이콘, IPA 빌드까지 하루에.', tags: [['flutter','Flutter'],['','iOS'],['','Android'],['web','홈페이지 v1.2.0']], major: 2 },
      { date: '2026-04-15', title: '자동화 인프라 구축', desc: '작업일지/할일/사이드프로젝트 브리핑 스킬 정비.', tags: [['ai','Claude Code'],['infra','자동화']] },
      { date: '2026-04-15', title: 'Apple App Store 심사 제출', desc: '메모요 iOS 버전 App Store Connect 제출.', tags: [['','App Store'],['','iOS']] },
      { date: '2026-04-16', title: 'Google Play 비공개 테스트 제출', desc: '앱 설정 11/11 완료, 카테고리 "생산성", 비공개 테스트 검토 제출.', tags: [['','Google Play'],['','Android'],['','베타 테스트']], major: 3 },
      { date: '2026-04-16', title: '홈페이지 v1.3.0 + 웹 프로젝트', desc: '할일 페이지, 카카오톡 오픈채팅, 더치페이 계산기, 타임라인 페이지 추가.', tags: [['web','HTML/CSS/JS'],['','포트폴리오']] },
      { date: '2026-04-17', title: 'Play Closed Testing 오픈 + 홈페이지 v1.4 개편', desc: '비공개 테스트 활성화, 베타테스터 모집 시작. 홈페이지 FAB 리디자인·포트폴리오 히어로 개편.', tags: [['','Google Play'],['web','홈페이지 v1.4'],['','베타 테스트']], major: 4 },
      { date: '2026-04-18', title: '홈페이지 v1.5 대시보드 3종 개편', desc: 'todos/done/cancelled 페이지에 히어로·필터·스트릭·히트맵·D-day·프로젝트 태그를 입혔다. 4/11~4/14 사후 스냅샷 복원과 스탠드업 포맷 재작성으로 과거 기록도 정돈.', tags: [['web','HTML/CSS/JS'],['','포트폴리오'],['infra','자동화']] },
      { date: '2026-04-18', title: '심사 모니터·아침 브리핑 스킬 신규', desc: 'Gmail 기반 /review-status-check 봇으로 Play·App Store 심사 상태를 매시간 감시. 아침 스킬 3개를 /morning-briefing 으로 통합해 단일 메시지로 정돈.', tags: [['ai','Claude Code'],['infra','자동화']] },
      { date: '2026-04-19', title: '더치페이 계산기 아이콘 리디자인 + 출시 트랙 진입', desc: '노란 배경 + 흰 코인 + 앰버 ₩ + 코너 한글 4글자(더·치·페·이) 조합으로 아이콘 재설계. Apple 3.1.1 대응으로 응원 버튼 제거하고 Flutter SDK 마이그레이션까지 반영해 iOS TestFlight / Android Play 출시 준비 착수.', tags: [['flutter','Flutter'],['','iOS'],['','Android'],['','App Store']], major: 5 },
      { date: '2026-04-20', title: '한줄일기 MVP + 약먹자 비공개 테스트 마감', desc: '한줄일기(hanjul) Flutter MVP v0 완성 — 토스 스타일 + AI 응원 stub. /to-iphone /land 페어로 실기 설치 통과. 약먹자 Play Console 비공개 테스트 제출도 마무리.', tags: [['flutter','Flutter'],['','iOS'],['','Android']], major: 6 },
      { date: '2026-04-21', title: '한줄일기 GPT-4o mini 연동 + 심사레이더 v0.1', desc: 'API 키 보호용 Cloudflare Workers 프록시 작성·배포 → 한줄일기 ai_service 를 실제 GPT-4o mini 호출로 교체. 야간 자동 러너로 심사레이더 v0.1 MVP 스캐폴드 + Gmail OAuth 실연동까지 동시에 완료.', tags: [['flutter','Flutter'],['ai','Claude AI'],['infra','Cloudflare']] },
      { date: '2026-04-22', title: '한줄일기 dawn-sky + 감정 히트맵 디자인 채택', desc: 'A2 dawn/night 그라데이션 + B2 53주 감정 히트맵 하이브리드 시안 채택(commit 41befd6, 1294줄). Mac↔WSL 코드 동기화 갭은 훅·스킬·/sync 세 겹으로 봉합.', tags: [['flutter','Flutter'],['web','디자인']], major: 7 },
      { date: '2026-04-23', title: '심사레이더 v0.2 디자인 + 한줄일기 출시 트랙', desc: '심사레이더 v0.2 = A2 Traffic Light + B1 Mono-section 하이브리드 채택(a48e0e0). 한줄일기는 실기 검증 후 개인정보처리방침·스토어 메타·시뮬레이터 스크린샷까지 단일 세션에서 마감.', tags: [['flutter','Flutter'],['','iOS'],['','Android']] },
      { date: '2026-04-24', title: '약먹자·더치페이 iOS 심사 큐 투입 + Instagram 풀오토 포스팅 성공', desc: '약먹자 v1.0.1 / 더치페이 v1.0.2 양쪽 다 Apple 심사 큐 투입(23:39 / 23:57 KST). Playwright + Graph API 조합으로 Instagram full-auto 포스팅 성공, 13일치 백필 완주. 포모도로 Play Closed Testing alpha 업로드.', tags: [['','App Store'],['','iOS'],['infra','Instagram'],['infra','자동화']], major: 8 },
      { date: '2026-04-25', title: 'SSH+tmux 양방향 zero-touch 핸드오프 + 한줄일기 ship-ready', desc: '크로스 디바이스 핸드오프가 텔레그램 트리거에서 SSH+tmux METHOD A 무복붙 직접 인젝션으로 진화. 한줄일기 Android 런처 아이콘 5종 + Play Store hi-res/feature graphic + 스크린샷 4종 + JSON 백업 기능 추가로 ship-ready 도달.', tags: [['infra','자동화'],['flutter','Flutter'],['','Android']], major: 9 },
      { date: '2026-04-26', title: '4-노드 LLM 인프라 + 심사레이더 v0.2 main + 포모도로 Play 제출', desc: '본가 M1 맥미니 24/7 허브로 4-노드 LLM 인프라 e2e 셋업. 심사레이더 v0.2 main 머지, 포모도로 Play Console 심사 제출, 단어요(wordbook) MVP 결정 5건 락다운(plan 파일).', tags: [['infra','LLM'],['','Google Play'],['flutter','Flutter']], major: 10 },
      { date: '2026-04-27', title: '약먹자·더치페이 iOS reject 재대응 + 옵션 X 확정', desc: 'Apple Resolution Center 답변(영문 6항목) + demo video 시뮬레이터 자동촬영으로 두 앱 reject 재대응 발송, 24~48h 재심사 대기. 한줄일기 UI 마이크로 인터랙션 폴리시. 4-노드 인프라는 가정 정정으로 옵션 X(MacBook Pro launchd SoT 유지 + 맥미니 fallback)로 확정.', tags: [['','App Store'],['flutter','Flutter'],['infra','자동화']] }
    ];

    function parseDate(s) {
      var parts = s.split('-');
      return new Date(+parts[0], +parts[1] - 1, +parts[2]);
    }
    function ymd(d) {
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, '0');
      var da = String(d.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + da;
    }

    // Stats
    var startDate = parseDate('2026-04-11');
    var today = new Date(); today.setHours(0,0,0,0);
    var daysSinceStart = Math.floor((today - startDate) / 86400000) + 1;
    var activeDaysSet = {};
    events.forEach(function(e) { activeDaysSet[e.date] = true; });
    var activeDays = Object.keys(activeDaysSet).length;
    var totalEvents = events.length;
    var majorCount = events.filter(function(e) { return e.major; }).length;

    // longest streak of days with events
    var sortedDates = Object.keys(activeDaysSet).sort();
    var longestStreak = 0, currentStreak = 0, prev = null;
    sortedDates.forEach(function(ds) {
      var d = parseDate(ds);
      if (prev && (d - prev) === 86400000) currentStreak++;
      else currentStreak = 1;
      if (currentStreak > longestStreak) longestStreak = currentStreak;
      prev = d;
    });

    var statsEl = document.getElementById('stats');
    statsEl.innerHTML =
      '<div class="stat"><div class="stat-num" id="dayCount">0</div><div class="stat-label">개발 일수</div></div>' +
      '<div class="stat"><div class="stat-num">' + totalEvents + '</div><div class="stat-label">총 이벤트</div></div>' +
      '<div class="stat"><div class="stat-num">' + longestStreak + '</div><div class="stat-label">최장 연속일</div></div>' +
      '<div class="stat"><div class="stat-num">' + majorCount + '</div><div class="stat-label">주요 마일스톤</div></div>';

    // Animate day counter
    var dayEl = document.getElementById('dayCount');
    var c = 0;
    var iv = setInterval(function() {
      c++;
      dayEl.textContent = c;
      if (c >= daysSinceStart) clearInterval(iv);
    }, 60);

    // Heatmap — 12 weeks window ending on Saturday after today
    var endDate = new Date(today);
    // Move endDate to the Saturday of current week
    endDate.setDate(endDate.getDate() + (6 - endDate.getDay()));
    var totalWeeks = 12;
    var totalCells = totalWeeks * 7;
    var firstCellDate = new Date(endDate);
    firstCellDate.setDate(firstCellDate.getDate() - (totalCells - 1));

    // Align first cell to Sunday (should already be, since endDate is Saturday)
    var eventCountByDate = {};
    events.forEach(function(e) {
      eventCountByDate[e.date] = (eventCountByDate[e.date] || 0) + 1;
    });

    var daysEl = document.getElementById('heatmapDays');
    var dayLabels = ['', 'Mon', '', 'Wed', '', 'Fri', ''];
    daysEl.innerHTML = dayLabels.map(function(d) { return '<div class="heatmap-day-label">' + d + '</div>'; }).join('');

    var gridEl = document.getElementById('heatmapGrid');
    var monthsEl = document.getElementById('heatmapMonths');
    var gridHtml = '';
    var monthsHtml = '';
    var lastMonthShown = -1;
    for (var w = 0; w < totalWeeks; w++) {
      var weekStartDate = new Date(firstCellDate);
      weekStartDate.setDate(firstCellDate.getDate() + w * 7);
      var m = weekStartDate.getMonth();
      if (m !== lastMonthShown) {
        monthsHtml += '<div style="width:' + (12 + 3) + 'px;flex-shrink:0">' + (m + 1) + '월</div>';
        lastMonthShown = m;
      } else {
        monthsHtml += '<div style="width:' + (12 + 3) + 'px;flex-shrink:0"></div>';
      }
      for (var d = 0; d < 7; d++) {
        var cellDate = new Date(firstCellDate);
        cellDate.setDate(firstCellDate.getDate() + w * 7 + d);
        var key = ymd(cellDate);
        var count = eventCountByDate[key] || 0;
        var isFuture = cellDate > today;
        var isBeforeStart = cellDate < startDate;
        var lvClass = '';
        if (!isFuture && !isBeforeStart) {
          if (count >= 4) lvClass = 'lv4';
          else if (count >= 3) lvClass = 'lv3';
          else if (count >= 2) lvClass = 'lv2';
          else if (count >= 1) lvClass = 'lv1';
        }
        var titleAttr = key + (count > 0 ? ' · ' + count + '개 이벤트' : '');
        gridHtml += '<div class="hm-cell ' + lvClass + '" title="' + titleAttr + '" style="grid-row:' + (d + 1) + ';grid-column:' + (w + 1) + '"></div>';
      }
    }
    gridEl.innerHTML = gridHtml;
    monthsEl.innerHTML = monthsHtml;

    // Milestones
    var msEl = document.getElementById('milestones');
    var majors = events.filter(function(e) { return e.major; });
    msEl.innerHTML = majors.map(function(e) {
      return '<div class="ms-card">' +
        '<div class="ms-num">' + e.major + '</div>' +
        '<div class="ms-date">' + e.date.replace(/-/g, '.') + '</div>' +
        '<div class="ms-title">' + e.title + '</div>' +
      '</div>';
    }).join('');

    // Events list
    var evEl = document.getElementById('events');
    var sorted = events.slice().sort(function(a, b) {
      return a.date === b.date ? 0 : (a.date < b.date ? 1 : -1);
    });
    evEl.innerHTML = sorted.map(function(e) {
      var tagsHtml = e.tags.map(function(t) {
        return '<span class="tag ' + t[0] + '">' + t[1] + '</span>';
      }).join('');
      return '<div class="event-row ' + (e.major ? 'major' : '') + '">' +
        '<div class="er-date">' + e.date.replace(/-/g, '.') + '</div>' +
        '<div class="er-title"><strong>' + e.title + '</strong><span>' + e.desc + '</span></div>' +
        '<div class="er-tags">' + tagsHtml + '</div>' +
      '</div>';
    }).join('');
  </script>
</body>
</html>

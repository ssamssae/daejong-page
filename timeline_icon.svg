<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffca28"/>
      <stop offset="100%" style="stop-color:#ffd54f"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e1e1e;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#1e1e1e;stop-opacity:0.9"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="28" y1="96" x2="100" y2="96" stroke="#1e1e1e" stroke-opacity="0.15" stroke-width="1.5"/>
  <line x1="28" y1="76" x2="100" y2="76" stroke="#1e1e1e" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="28" y1="56" x2="100" y2="56" stroke="#1e1e1e" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="28" y1="36" x2="100" y2="36" stroke="#1e1e1e" stroke-opacity="0.1" stroke-width="1"/>
  <!-- Chart line -->
  <polyline points="32,88 48,72 62,78 76,48 90,38 98,32" fill="none" stroke="#1e1e1e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.8"/>
  <!-- Data points -->
  <circle cx="32" cy="88" r="4" fill="#1e1e1e" fill-opacity="0.85"/>
  <circle cx="48" cy="72" r="4" fill="#1e1e1e" fill-opacity="0.85"/>
  <circle cx="62" cy="78" r="4" fill="#1e1e1e" fill-opacity="0.85"/>
  <circle cx="76" cy="48" r="4" fill="#1e1e1e" fill-opacity="0.85"/>
  <circle cx="90" cy="38" r="4" fill="#1e1e1e" fill-opacity="0.85"/>
  <circle cx="98" cy="32" r="5" fill="#1e1e1e" fill-opacity="0.9"/>
  <!-- Glow on last point -->
  <circle cx="98" cy="32" r="8" fill="#1e1e1e" fill-opacity="0.12"/>
</svg>

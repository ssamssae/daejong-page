<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할일 - 강대종</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      padding: 32px 16px 80px;
      line-height: 1.7;
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 0 8px; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #2a2a2a;
    }
    header h1 { font-size: 22px; color: #ffd54f; font-weight: 700; }
    header a { color: #9e9e9e; text-decoration: none; font-size: 14px; }
    header a:hover { color: #ffd54f; }

    /* Hero */
    .hero {
      display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px;
    }
    .hero-priority {
      background: linear-gradient(135deg, #2a2515 0%, #1f1d10 100%);
      border: 1px solid rgba(255, 213, 79, 0.45);
      border-radius: 16px;
      padding: 18px 20px;
      box-shadow: 0 0 24px rgba(255, 213, 79, 0.06);
    }
    .hero-priority-label {
      font-size: 11px; color: #ffd54f; font-weight: 700; letter-spacing: 1.5px;
      margin-bottom: 6px;
    }
    .hero-priority-text {
      font-size: 15px; color: #fff; font-weight: 600; line-height: 1.55;
    }
    .hero-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .hero-card {
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px;
      padding: 14px 16px;
    }
    .hero-card-label {
      font-size: 11px; color: #9e9e9e; margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .hero-card-value { font-size: 20px; color: #e0e0e0; font-weight: 700; }
    .hero-card-sub { font-size: 11px; color: #666; margin-top: 4px; }
    .progress-bar-wrap {
      margin-top: 8px; height: 6px; background: #2a2a2a;
      border-radius: 3px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #ffd54f 0%, #ffb300 100%);
      border-radius: 3px; transition: width 0.6s ease;
    }

    /* Countdown widget */
    .countdown {
      background: linear-gradient(135deg, #1d1a0d 0%, #1a1a1a 100%);
      border: 1px solid rgba(255, 171, 145, 0.35);
      border-radius: 14px; padding: 14px 18px;
    }
    .countdown-label {
      font-size: 10px; color: #ffab91; font-weight: 700;
      letter-spacing: 1.5px; margin-bottom: 6px;
    }
    .countdown-title { font-size: 13px; color: #e0e0e0; font-weight: 600; margin-bottom: 8px; }
    .countdown-days {
      display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px;
    }
    .countdown-num { font-size: 28px; color: #ffab91; font-weight: 800; line-height: 1; }
    .countdown-unit { font-size: 13px; color: #9e9e9e; }
    .countdown-date { font-size: 11px; color: #666; }
    .countdown-progress {
      margin-top: 10px; height: 5px; background: #2a2a2a; border-radius: 3px; overflow: hidden;
    }
    .countdown-progress-fill {
      height: 100%; background: linear-gradient(90deg, #ffab91 0%, #ff7043 100%);
      border-radius: 3px;
    }

    /* Filters */
    .controls {
      margin-bottom: 16px; display: flex; flex-direction: column; gap: 10px;
    }
    .tabs {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .tab {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      color: #aaa; font-size: 13px; font-weight: 600;
      padding: 7px 14px; border-radius: 20px; cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .tab:hover { border-color: #444; color: #e0e0e0; }
    .tab.active {
      background: #2a2515; border-color: #ffd54f; color: #ffd54f;
    }
    .tab-count {
      display: inline-block; margin-left: 6px;
      font-size: 11px; color: #666;
    }
    .tab.active .tab-count { color: #ffd54f; }

    .chip-scroll {
      display: flex; gap: 6px;
      overflow-x: auto; padding-bottom: 4px;
      scrollbar-width: none;
    }
    .chip-scroll::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      background: transparent; border: 1px solid #333;
      color: #9e9e9e; font-size: 12px;
      padding: 5px 12px; border-radius: 14px; cursor: pointer;
      transition: all 0.15s; font-family: inherit;
    }
    .chip:hover { border-color: #555; color: #e0e0e0; }
    .chip.active {
      background: rgba(255, 213, 79, 0.12);
      border-color: #ffd54f;
      color: #ffd54f;
    }

    /* Todo cards */
    .todo-list { display: flex; flex-direction: column; gap: 10px; }
    .todo {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 12px; padding: 14px 16px;
      transition: border-color 0.15s;
    }
    .todo:hover { border-color: #3a3a3a; }
    .todo.priority {
      border-color: rgba(255, 213, 79, 0.4);
      background: linear-gradient(135deg, #20200f 0%, #1a1a1a 100%);
    }
    .todo.done { opacity: 0.55; }

    .todo-head {
      display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px;
    }
    .todo-check {
      flex-shrink: 0; width: 18px; height: 18px; border-radius: 5px;
      border: 2px solid #555; margin-top: 3px;
      display: flex; align-items: center; justify-content: center;
    }
    .todo.done .todo-check { border-color: #4caf50; background: #4caf50; }
    .todo.done .todo-check::after {
      content: '✓'; color: #fff; font-size: 11px; font-weight: bold;
    }
    .todo.priority .todo-check { border-color: #ffd54f; }

    .todo-text {
      flex: 1; font-size: 14px; color: #d0d0d0; line-height: 1.55;
      word-break: keep-all; overflow-wrap: break-word;
    }
    .todo.done .todo-text { text-decoration: line-through; color: #777; }
    .todo-star { color: #ffd54f; margin-right: 4px; }

    .todo-meta {
      display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
      margin-top: 8px; padding-left: 28px;
    }
    .todo-tag {
      font-size: 10px; padding: 2px 8px; border-radius: 8px;
      background: #2a2a2a; color: #aaa; border: 1px solid #3a3a3a;
      font-weight: 500;
    }
    .todo-tag.memoyo { border-color: #81c784; color: #81c784; }
    .todo-tag.web { border-color: #4fc3f7; color: #4fc3f7; }
    .todo-tag.infra { border-color: #ce93d8; color: #ce93d8; }
    .todo-tag.remote { border-color: #b0bec5; color: #b0bec5; }
    .todo-tag.skill { border-color: #ffd54f; color: #ffd54f; }
    .todo-tag.release { border-color: #ffab91; color: #ffab91; }
    .todo-tag.ios { border-color: #f48fb1; color: #f48fb1; }
    .todo-tag.android { border-color: #a5d6a7; color: #a5d6a7; }

    .dday {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 8px;
      background: #2a2a2a; color: #aaa; border: 1px solid #3a3a3a;
      letter-spacing: 0.3px;
    }
    .dday.urgent { background: rgba(239, 83, 80, 0.15); color: #ef5350; border-color: rgba(239, 83, 80, 0.45); }
    .dday.soon { background: rgba(255, 167, 38, 0.12); color: #ffa726; border-color: rgba(255, 167, 38, 0.4); }
    .dday.passed { background: rgba(117, 117, 117, 0.2); color: #757575; border-color: #424242; }

    .todo-date-info {
      font-size: 11px; color: #666;
    }

    /* Drawer */
    .drawer {
      margin-top: 28px; border-top: 1px solid #2a2a2a; padding-top: 20px;
    }
    .drawer-toggle {
      background: transparent; border: 1px solid #333;
      color: #9e9e9e; font-size: 13px; font-weight: 500;
      padding: 10px 16px; border-radius: 10px; cursor: pointer;
      width: 100%; text-align: left; transition: all 0.15s;
      font-family: inherit;
      display: flex; align-items: center; justify-content: space-between;
    }
    .drawer-toggle:hover { border-color: #555; color: #e0e0e0; }
    .drawer-toggle .arrow { transition: transform 0.2s; }
    .drawer.open .drawer-toggle .arrow { transform: rotate(90deg); }
    .drawer-content {
      display: none; margin-top: 12px;
      flex-direction: column; gap: 8px;
    }
    .drawer.open .drawer-content { display: flex; }
    .snap-item {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 10px; padding: 10px 14px; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      transition: all 0.15s; font-size: 13px;
    }
    .snap-item:hover { border-color: #444; background: #1f1f1f; }
    .snap-item.active { border-color: #ffd54f; background: #2a2515; }
    .snap-date { color: #e0e0e0; font-weight: 600; }
    .snap-version {
      font-size: 10px; color: #ffd54f;
      background: rgba(255, 213, 79, 0.12);
      padding: 2px 8px; border-radius: 8px;
      border: 1px solid rgba(255, 213, 79, 0.3);
    }

    .loading { color: #666; text-align: center; padding: 40px 0; font-size: 14px; font-style: italic; }
    .error { color: #ef5350; text-align: center; padding: 40px 0; font-size: 14px; }
    .empty { color: #666; text-align: center; padding: 40px 0; font-size: 13px; }

    .back {
      display: inline-block; margin-top: 28px; color: #9e9e9e;
      text-decoration: none; font-size: 14px;
    }
    .back:hover { color: #ffd54f; }

    @media (max-width: 480px) {
      .hero-stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>할일</h1>
      <a href="./">← 홈으로</a>
    </header>

    <div id="view">
      <div class="loading">불러오는 중…</div>
    </div>

    <a class="back" href="./">← 홈으로 돌아가기</a>
  </div>

  <script>
    const viewEl = document.getElementById('view');

    // Project tag keywords
    const PROJECT_TAGS = [
      { cls: 'memoyo', label: '메모요', keywords: ['메모요', 'memoyo', 'simple_memo', 'simpleMemoApp'] },
      { cls: 'web', label: '홈페이지', keywords: ['daejong-page', '홈페이지', '포트폴리오'] },
      { cls: 'infra', label: '자동화', keywords: ['launchd', 'Playwright', '자동 등록', '워커', '인프라', 'Apps Script', 'Google Groups'] },
      { cls: 'remote', label: '원격제어', keywords: ['원격제어', 'WebRTC', 'Parsec', 'TURN'] },
      { cls: 'skill', label: '스킬', keywords: ['스킬', 'Claude Code', '/usage', '/briefing'] },
      { cls: 'ios', label: 'iOS', keywords: ['iOS', 'App Store', 'UIPasteControl', 'TestFlight', 'Xcode'] },
      { cls: 'android', label: 'Android', keywords: ['Android', 'Play Store', 'Closed Testing', 'Play Console', 'aab'] },
      { cls: 'release', label: '출시', keywords: ['출시', '심사', '제출', '사전예약', '베타테스터'] },
    ];

    function detectTags(text) {
      const found = [];
      for (const t of PROJECT_TAGS) {
        for (const kw of t.keywords) {
          if (text.indexOf(kw) !== -1) { found.push(t); break; }
        }
      }
      return found;
    }

    // Date helpers
    function todayKST() {
      const now = new Date();
      const kst = new Date(now.getTime() + (now.getTimezoneOffset() + 540) * 60000);
      kst.setHours(0, 0, 0, 0);
      return kst;
    }

    function parseDate(s) {
      // YYYY-MM-DD
      const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!m) return null;
      return new Date(+m[1], +m[2] - 1, +m[3]);
    }

    function extractDeadline(text, addedDate) {
      // Try patterns in order:
      // "~2026-05-01", "(~05-01)", "YYYY-MM-DD~YYYY-MM-DD" (use end), "Day 14(~05-01)"
      let m = text.match(/~\s*(\d{4}-\d{2}-\d{2})/);
      if (m) return m[1];

      m = text.match(/(\d{4}-\d{2}-\d{2})\s*~\s*(\d{4}-\d{2}-\d{2})/);
      if (m) return m[2];

      m = text.match(/~\s*(\d{2}-\d{2})(?![\d])/);
      if (m) {
        const yr = addedDate ? addedDate.slice(0, 4) : new Date().getFullYear();
        return yr + '-' + m[1];
      }
      return null;
    }

    function ddayLabel(deadlineStr) {
      const d = parseDate(deadlineStr);
      if (!d) return null;
      const today = todayKST();
      const diff = Math.round((d - today) / 86400000);
      let cls = '';
      let label = '';
      if (diff < 0) { cls = 'passed'; label = 'D+' + Math.abs(diff) + ' 지남'; }
      else if (diff === 0) { cls = 'urgent'; label = 'D-DAY'; }
      else if (diff <= 7) { cls = 'urgent'; label = 'D-' + diff; }
      else if (diff <= 30) { cls = 'soon'; label = 'D-' + diff; }
      else { cls = ''; label = 'D-' + diff; }
      return { cls: cls, label: label, date: deadlineStr, diff: diff };
    }

    function daysSince(dateStr) {
      const d = parseDate(dateStr);
      if (!d) return null;
      return Math.round((todayKST() - d) / 86400000);
    }

    // Markdown parser
    function parseTodos(md) {
      const sections = { inprogress: [], done: [], hold: [], ideas: [] };
      let current = null;
      for (const line of md.split('\n')) {
        const trimmed = line.trim();
        if (/^## 진행중/.test(trimmed)) { current = 'inprogress'; continue; }
        if (/^## 완료/.test(trimmed)) { current = 'done'; continue; }
        if (/^## 보류|^## 취소/.test(trimmed)) { current = 'hold'; continue; }
        if (/^## 사이드/.test(trimmed)) { current = 'ideas'; continue; }
        if (/^#/.test(trimmed)) { current = null; continue; }
        if (current && /^- \[/.test(trimmed)) {
          const isDone = /^- \[x\]/i.test(trimmed);
          const isPriority = trimmed.includes('\u2B50');
          let text = trimmed.replace(/^- \[.\]\s*/, '').replace(/\u2B50\s*/g, '');
          const dateMatch = text.match(/\(추가:\s*([^,)]+)(?:,\s*완료:\s*([^)]+))?\)/);
          let addedDate = '', doneDate = '';
          if (dateMatch) {
            addedDate = (dateMatch[1] || '').trim();
            doneDate = (dateMatch[2] || '').trim();
            text = text.replace(dateMatch[0], '').trim();
          }
          const tags = detectTags(text);
          const deadline = extractDeadline(text, addedDate);
          const dday = deadline ? ddayLabel(deadline) : null;
          sections[current].push({
            text, isDone, isPriority, addedDate, doneDate, tags, deadline, dday,
            section: current,
          });
        }
      }
      return sections;
    }

    // Special: detect memoyo Closed Testing countdown
    function findMemoyoCountdown(items) {
      for (const it of items) {
        if (it.isDone) continue;
        const m = it.text.match(/Closed Testing[^(]*?(\d{4}-\d{2}-\d{2})\s*~\s*(\d{4}-\d{2}-\d{2})/);
        if (m) {
          const start = parseDate(m[1]);
          const end = parseDate(m[2]);
          const today = todayKST();
          const total = Math.round((end - start) / 86400000);
          const elapsed = Math.round((today - start) / 86400000);
          const remaining = Math.max(0, Math.round((end - today) / 86400000));
          const pct = Math.max(0, Math.min(100, (elapsed / total) * 100));
          return {
            start: m[1], end: m[2],
            totalDays: total, elapsedDays: Math.max(0, elapsed),
            remainingDays: remaining, progressPct: pct,
          };
        }
      }
      return null;
    }

    // Sorting
    function sortTodos(items) {
      return items.slice().sort((a, b) => {
        if (a.isPriority !== b.isPriority) return a.isPriority ? -1 : 1;
        // Deadline sooner first (nulls last)
        const ad = a.dday ? a.dday.diff : null;
        const bd = b.dday ? b.dday.diff : null;
        if (ad !== null && bd !== null) return ad - bd;
        if (ad !== null) return -1;
        if (bd !== null) return 1;
        // Added date newer first
        return (b.addedDate || '').localeCompare(a.addedDate || '');
      });
    }

    function escapeHtml(s) {
      return (s || '').replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    // State
    const state = {
      versions: [],
      currentVersion: null,
      sections: null,
      tab: 'inprogress',
      activeTag: null,
      drawerOpen: false,
      prevSections: null, // for "recent completions" count
    };

    async function init() {
      try {
        const res = await fetch('./todos/index.json?_=' + Date.now());
        const data = await res.json();
        state.versions = (data.versions || []).slice().sort((a, b) => {
          if (a.date !== b.date) return b.date.localeCompare(a.date);
          return (b.version || '').localeCompare(a.version || '');
        });
        if (state.versions.length === 0) {
          viewEl.innerHTML = '<div class="empty">버전이 없습니다.</div>';
          return;
        }
        await loadVersion(state.versions[0]);
      } catch (e) {
        viewEl.innerHTML = '<div class="error">인덱스를 불러오지 못했습니다.</div>';
      }
    }

    async function loadVersion(version) {
      state.currentVersion = version;
      state.activeTag = null;
      try {
        const res = await fetch('./todos/' + version.file + '?_=' + Date.now());
        const text = await res.text();
        state.sections = parseTodos(text);

        // Load previous version for "completed in last N days" metric
        const idx = state.versions.findIndex(v => v.file === version.file);
        if (idx >= 0 && idx < state.versions.length - 1) {
          try {
            const prevRes = await fetch('./todos/' + state.versions[idx + 1].file + '?_=' + Date.now());
            const prevText = await prevRes.text();
            state.prevSections = parseTodos(prevText);
          } catch (e) { state.prevSections = null; }
        } else {
          state.prevSections = null;
        }
        render();
      } catch (e) {
        viewEl.innerHTML = '<div class="error">파일을 불러오지 못했습니다.</div>';
      }
    }

    function render() {
      const s = state.sections;
      if (!s) return;

      const all = [...s.inprogress, ...s.done];
      const total = all.length;
      const doneCount = s.done.length + s.inprogress.filter(i => i.isDone).length;
      const activeCount = s.inprogress.filter(i => !i.isDone).length;
      const donePct = total > 0 ? Math.round((doneCount / total) * 100) : 0;

      // Priority item
      const priority = s.inprogress.find(i => i.isPriority && !i.isDone);

      // Memoyo countdown
      const countdown = findMemoyoCountdown(s.inprogress);

      // Recent completions (compare with prev snapshot)
      let recentCompleted = 0;
      let recentDays = null;
      if (state.prevSections && state.currentVersion) {
        const prevDoneKeys = new Set();
        const prevAll = [...state.prevSections.inprogress, ...state.prevSections.done];
        for (const it of prevAll) {
          if (it.isDone) prevDoneKeys.add(it.text.slice(0, 40));
        }
        for (const it of all) {
          if (it.isDone && !prevDoneKeys.has(it.text.slice(0, 40))) recentCompleted++;
        }
        // Days between snapshots
        const cur = parseDate(state.currentVersion.date);
        const idx = state.versions.findIndex(v => v.file === state.currentVersion.file);
        const prev = state.versions[idx + 1];
        if (cur && prev) {
          const prevD = parseDate(prev.date);
          if (prevD) recentDays = Math.max(1, Math.round((cur - prevD) / 86400000));
        }
      }

      // Collect available tags from current tab items
      const tabItems = (state.tab === 'inprogress')
        ? s.inprogress.filter(i => !i.isDone)
        : (state.tab === 'done')
          ? [...s.done, ...s.inprogress.filter(i => i.isDone)]
          : all;
      const tagCounts = {};
      for (const it of tabItems) {
        for (const t of it.tags) {
          tagCounts[t.cls] = (tagCounts[t.cls] || 0) + 1;
        }
      }

      // Hero HTML
      let heroHtml = '<div class="hero">';
      if (priority) {
        heroHtml +=
          '<div class="hero-priority">' +
          '<div class="hero-priority-label">★ 지금 집중</div>' +
          '<div class="hero-priority-text">' + escapeHtml(priority.text) + '</div>' +
          '</div>';
      }

      heroHtml += '<div class="hero-stats">';
      heroHtml +=
        '<div class="hero-card">' +
        '<div class="hero-card-label">진행률</div>' +
        '<div class="hero-card-value">' + donePct + '%</div>' +
        '<div class="hero-card-sub">' + doneCount + '개 완료 · ' + activeCount + '개 진행중</div>' +
        '<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:' + donePct + '%"></div></div>' +
        '</div>';

      if (recentCompleted > 0 && recentDays !== null) {
        heroHtml +=
          '<div class="hero-card">' +
          '<div class="hero-card-label">최근 완료 속도</div>' +
          '<div class="hero-card-value">' + recentCompleted + '<span style="font-size:13px;color:#9e9e9e;font-weight:500;">건</span></div>' +
          '<div class="hero-card-sub">지난 ' + recentDays + '일 동안</div>' +
          '</div>';
      } else {
        heroHtml +=
          '<div class="hero-card">' +
          '<div class="hero-card-label">스냅샷</div>' +
          '<div class="hero-card-value" style="font-size:14px;">' + state.currentVersion.date + '</div>' +
          '<div class="hero-card-sub">' + state.currentVersion.version + ' · 버전 ' + state.versions.length + '개</div>' +
          '</div>';
      }
      heroHtml += '</div>';

      if (countdown) {
        heroHtml +=
          '<div class="countdown">' +
          '<div class="countdown-label">⏱ 메모요 CLOSED TESTING</div>' +
          '<div class="countdown-title">Day ' + countdown.elapsedDays + ' / ' + countdown.totalDays + ' · Production Access Form 제출까지</div>' +
          '<div class="countdown-days">' +
          '<div class="countdown-num">' + countdown.remainingDays + '</div>' +
          '<div class="countdown-unit">일 남음</div>' +
          '</div>' +
          '<div class="countdown-date">' + countdown.start + ' ~ ' + countdown.end + '</div>' +
          '<div class="countdown-progress"><div class="countdown-progress-fill" style="width:' + countdown.progressPct + '%"></div></div>' +
          '</div>';
      }
      heroHtml += '</div>';

      // Controls
      let controlsHtml = '<div class="controls">';
      controlsHtml += '<div class="tabs">';
      const tabDefs = [
        { key: 'inprogress', label: '진행중', count: activeCount },
        { key: 'done', label: '완료', count: doneCount },
        { key: 'all', label: '전체', count: total },
      ];
      if (s.ideas.length > 0) tabDefs.push({ key: 'ideas', label: '아이디어', count: s.ideas.length });
      if (s.hold.length > 0) tabDefs.push({ key: 'hold', label: '보류', count: s.hold.length });
      for (const t of tabDefs) {
        const active = t.key === state.tab ? ' active' : '';
        controlsHtml +=
          '<button class="tab' + active + '" data-tab="' + t.key + '">' +
          t.label + '<span class="tab-count">' + t.count + '</span></button>';
      }
      controlsHtml += '</div>';

      // Tag chips
      const tagKeys = Object.keys(tagCounts);
      if (tagKeys.length > 0) {
        controlsHtml += '<div class="chip-scroll">';
        controlsHtml += '<button class="chip' + (state.activeTag === null ? ' active' : '') + '" data-chip="">전체</button>';
        for (const t of PROJECT_TAGS) {
          if (!tagCounts[t.cls]) continue;
          const active = state.activeTag === t.cls ? ' active' : '';
          controlsHtml +=
            '<button class="chip' + active + '" data-chip="' + t.cls + '">' +
            t.label + ' · ' + tagCounts[t.cls] + '</button>';
        }
        controlsHtml += '</div>';
      }
      controlsHtml += '</div>';

      // Filtered items
      let items;
      if (state.tab === 'inprogress') items = s.inprogress.filter(i => !i.isDone);
      else if (state.tab === 'done') items = [...s.done, ...s.inprogress.filter(i => i.isDone)];
      else if (state.tab === 'ideas') items = s.ideas;
      else if (state.tab === 'hold') items = s.hold;
      else items = all;

      if (state.activeTag) {
        items = items.filter(it => it.tags.some(t => t.cls === state.activeTag));
      }
      items = sortTodos(items);

      // Todo list
      let listHtml = '<div class="todo-list">';
      if (items.length === 0) {
        listHtml += '<div class="empty">조건에 맞는 항목이 없습니다.</div>';
      } else {
        for (const it of items) {
          const cls = 'todo' + (it.isPriority ? ' priority' : '') + (it.isDone ? ' done' : '');
          listHtml += '<div class="' + cls + '">';
          listHtml +=
            '<div class="todo-head">' +
            '<div class="todo-check"></div>' +
            '<div class="todo-text">' +
            (it.isPriority ? '<span class="todo-star">★</span>' : '') +
            escapeHtml(it.text) +
            '</div></div>';

          // Meta line
          const metaParts = [];
          for (const t of it.tags) {
            metaParts.push('<span class="todo-tag ' + t.cls + '">' + t.label + '</span>');
          }
          if (it.dday && !it.isDone) {
            metaParts.push('<span class="dday ' + it.dday.cls + '">' + it.dday.label + ' · ' + it.dday.date + '</span>');
          }
          if (it.isDone && it.doneDate) {
            const ds = daysSince(it.doneDate);
            const suffix = ds === 0 ? '오늘' : ds === 1 ? '어제' : ds + '일 전';
            metaParts.push('<span class="todo-date-info">완료 ' + suffix + ' · ' + it.doneDate + '</span>');
          } else if (it.addedDate) {
            const ds = daysSince(it.addedDate);
            if (ds !== null) {
              const suffix = ds === 0 ? '오늘 추가' : ds === 1 ? '어제 추가' : ds + '일 전 추가';
              metaParts.push('<span class="todo-date-info">' + suffix + '</span>');
            }
          }
          if (metaParts.length > 0) {
            listHtml += '<div class="todo-meta">' + metaParts.join('') + '</div>';
          }
          listHtml += '</div>';
        }
      }
      listHtml += '</div>';

      // Drawer
      let drawerHtml = '';
      if (state.versions.length > 1) {
        const openCls = state.drawerOpen ? ' open' : '';
        drawerHtml += '<div class="drawer' + openCls + '" id="drawer">';
        drawerHtml +=
          '<button class="drawer-toggle" id="drawer-toggle">' +
          '<span>📜 이전 스냅샷 ' + (state.versions.length - 1) + '개</span>' +
          '<span class="arrow">›</span>' +
          '</button>';
        drawerHtml += '<div class="drawer-content">';
        for (const v of state.versions) {
          const active = v.file === state.currentVersion.file ? ' active' : '';
          drawerHtml +=
            '<div class="snap-item' + active + '" data-file="' + v.file + '">' +
            '<span class="snap-date">' + v.date + '</span>' +
            '<span class="snap-version">' + (v.version || '—') + '</span>' +
            '</div>';
        }
        drawerHtml += '</div></div>';
      }

      viewEl.innerHTML = heroHtml + controlsHtml + listHtml + drawerHtml;
      bindEvents();
    }

    function bindEvents() {
      viewEl.querySelectorAll('[data-tab]').forEach(el => {
        el.addEventListener('click', () => {
          state.tab = el.dataset.tab;
          state.activeTag = null;
          render();
        });
      });
      viewEl.querySelectorAll('[data-chip]').forEach(el => {
        el.addEventListener('click', () => {
          const v = el.dataset.chip;
          state.activeTag = (v === '' || state.activeTag === v) ? null : v;
          render();
        });
      });
      const toggle = document.getElementById('drawer-toggle');
      if (toggle) {
        toggle.addEventListener('click', () => {
          state.drawerOpen = !state.drawerOpen;
          const drawer = document.getElementById('drawer');
          if (drawer) drawer.classList.toggle('open', state.drawerOpen);
        });
      }
      viewEl.querySelectorAll('[data-file]').forEach(el => {
        el.addEventListener('click', () => {
          const file = el.dataset.file;
          const v = state.versions.find(x => x.file === file);
          if (v) loadVersion(v);
        });
      });
    }

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할일 목록 - 강대종</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      padding: 32px 16px 80px;
      line-height: 1.7;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
    }
    .main-layout {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }
    .sidebar {
      width: 300px;
      min-width: 300px;
      max-height: calc(100vh - 140px);
      overflow-y: auto;
      position: sticky;
      top: 32px;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    .sidebar::-webkit-scrollbar-thumb:hover { background: #555; }
    .content-area {
      flex: 1;
      min-width: 0;
    }
    @media (max-width: 768px) {
      .main-layout { flex-direction: column; }
      .sidebar {
        width: 100%;
        min-width: unset;
        max-height: 240px;
        position: static;
      }
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid #2a2a2a;
    }
    header h1 {
      font-size: 22px;
      color: #ffd54f;
      font-weight: 700;
    }
    header a {
      color: #9e9e9e;
      text-decoration: none;
      font-size: 14px;
    }
    header a:hover { color: #ffd54f; }
    .entry-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .entry-list li {
      background: #1e1e1e;
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.2s;
      border: 1px solid #2a2a2a;
    }
    .entry-list li:hover { background: #262626; }
    .entry-list li.active {
      background: #2a2515;
      border-color: #ffd54f;
    }
    .entry-date {
      font-size: 12px;
      color: #9e9e9e;
      margin-bottom: 4px;
    }
    .entry-title {
      font-size: 16px;
      color: #e0e0e0;
      font-weight: 600;
    }
    .entry-version {
      font-size: 11px;
      color: #ffd54f;
      background: #2a2515;
      padding: 2px 8px;
      border-radius: 10px;
      display: inline-block;
      margin-left: 8px;
    }
    .content {
      background: #1e1e1e;
      border-radius: 16px;
      padding: 32px 28px;
      min-height: 200px;
    }
    .content:empty::before {
      content: "왼쪽 목록에서 날짜를 선택해주세요.";
      color: #666;
    }
    .section { margin-bottom: 28px; }
    .section:last-child { margin-bottom: 0; }
    .section-title {
      font-size: 16px;
      color: #ffd54f;
      font-weight: 700;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2a2a2a;
    }
    .todo-item {
      background: #141414;
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 8px;
      border: 1px solid #2a2a2a;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .todo-item.done { opacity: 0.55; }
    .todo-item.priority {
      border-color: #ffd54f;
      background: #2a2515;
    }
    .todo-check {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border-radius: 5px;
      border: 2px solid #555;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .todo-item.done .todo-check {
      border-color: #4caf50;
      background: #4caf50;
    }
    .todo-check-mark {
      display: none;
      color: #fff;
      font-size: 13px;
      font-weight: bold;
    }
    .todo-item.done .todo-check-mark { display: block; }
    .todo-text {
      flex: 1;
      font-size: 14px;
      color: #d0d0d0;
    }
    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: #777;
    }
    .todo-date {
      font-size: 11px;
      color: #777;
      margin-top: 4px;
    }
    .todo-star {
      color: #ffd54f;
      margin-right: 4px;
    }
    .empty { color: #555; font-size: 14px; padding: 16px; text-align: center; }
    .back {
      display: inline-block;
      margin-top: 24px;
      color: #9e9e9e;
      text-decoration: none;
      font-size: 14px;
    }
    .back:hover { color: #ffd54f; }
    .loading { color: #666; font-style: italic; }
    .error { color: #ef5350; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>할일 목록</h1>
      <a href="./">← 홈으로</a>
    </header>
    <div class="main-layout">
      <div class="sidebar">
        <ul class="entry-list" id="entries"></ul>
      </div>
      <div class="content-area">
        <div class="content" id="content"></div>
        <a class="back" href="./">← 홈으로 돌아가기</a>
      </div>
    </div>
  </div>
  <script>
    const entriesEl = document.getElementById('entries');
    const contentEl = document.getElementById('content');
    let activeLi = null;

    async function loadIndex() {
      try {
        const res = await fetch('./todos/index.json?_=' + Date.now());
        const data = await res.json();
        const versions = (data.versions || []).slice().sort((a, b) => {
          if (a.date !== b.date) return b.date.localeCompare(a.date);
          return (b.version || '').localeCompare(a.version || '');
        });
        renderList(versions);
      } catch (e) {
        entriesEl.innerHTML = '<li class="error">할일 목록을 불러오지 못했습니다.</li>';
      }
    }

    function renderList(versions) {
      entriesEl.innerHTML = '';
      if (versions.length === 0) {
        entriesEl.innerHTML = '<li class="empty">버전이 없습니다.</li>';
        return;
      }
      for (const v of versions) {
        const li = document.createElement('li');
        li.innerHTML =
          '<div class="entry-date">' + escapeHtml(v.date || '') + '</div>' +
          '<div class="entry-title">할일 스냅샷' +
          '<span class="entry-version">' + escapeHtml(v.version || '') + '</span></div>';
        li.addEventListener('click', () => loadVersion(v, li));
        entriesEl.appendChild(li);
      }
      loadVersion(versions[0], entriesEl.firstChild);
    }

    async function loadVersion(version, li) {
      if (activeLi) activeLi.classList.remove('active');
      li.classList.add('active');
      activeLi = li;
      contentEl.innerHTML = '<div class="loading">불러오는 중…</div>';
      try {
        const res = await fetch('./todos/' + version.file + '?_=' + Date.now());
        const text = await res.text();
        renderTodos(text);
      } catch (e) {
        contentEl.innerHTML = '<div class="error">파일을 불러오지 못했습니다.</div>';
      }
    }

    function renderTodos(md) {
      const sections = { inprogress: [], done: [], hold: [], ideas: [] };
      let current = null;

      for (const line of md.split('\n')) {
        const trimmed = line.trim();
        if (/^## 진행중/.test(trimmed)) { current = 'inprogress'; continue; }
        if (/^## 완료/.test(trimmed)) { current = 'done'; continue; }
        if (/^## 보류|^## 취소/.test(trimmed)) { current = 'hold'; continue; }
        if (/^## 사이드/.test(trimmed)) { current = 'ideas'; continue; }
        if (/^#/.test(trimmed)) { current = null; continue; }

        if (current && /^- \[/.test(trimmed)) {
          const isDone = /^- \[x\]/.test(trimmed);
          const isPriority = trimmed.includes('\u2B50');
          let text = trimmed.replace(/^- \[.\]\s*/, '').replace(/\u2B50\s*/g, '');
          const dateMatch = text.match(/\(추가:\s*([^,)]+)(?:,\s*완료:\s*([^)]+))?\)/);
          let addedDate = '';
          let doneDate = '';
          if (dateMatch) {
            addedDate = dateMatch[1];
            doneDate = dateMatch[2] || '';
            text = text.replace(dateMatch[0], '').trim();
          }
          sections[current].push({ text, isDone, isPriority, addedDate, doneDate });
        }
      }

      let html = '';

      if (sections.inprogress.length > 0) {
        html += '<div class="section"><div class="section-title">진행중</div>';
        for (const item of sections.inprogress) {
          const cls = item.isPriority ? 'todo-item priority' : 'todo-item';
          html += '<div class="' + cls + '">' +
            '<div class="todo-check"><span class="todo-check-mark">✓</span></div>' +
            '<div style="flex:1;"><div class="todo-text">' + (item.isPriority ? '<span class="todo-star">★</span>' : '') + escapeHtml(item.text) + '</div>' +
            (item.addedDate ? '<div class="todo-date">추가: ' + escapeHtml(item.addedDate) + '</div>' : '') +
            '</div></div>';
        }
        html += '</div>';
      }

      if (sections.done.length > 0) {
        html += '<div class="section"><div class="section-title">완료</div>';
        for (const item of sections.done) {
          html += '<div class="todo-item done">' +
            '<div class="todo-check"><span class="todo-check-mark">✓</span></div>' +
            '<div style="flex:1;"><div class="todo-text">' + escapeHtml(item.text) + '</div>' +
            (item.doneDate ? '<div class="todo-date">완료: ' + escapeHtml(item.doneDate) + '</div>' : '') +
            '</div></div>';
        }
        html += '</div>';
      }

      if (sections.hold.length > 0) {
        html += '<div class="section"><div class="section-title">보류/취소</div>';
        for (const item of sections.hold) {
          html += '<div class="todo-item"><div class="todo-check"></div>' +
            '<div class="todo-text">' + escapeHtml(item.text) + '</div></div>';
        }
        html += '</div>';
      }

      if (sections.ideas.length > 0) {
        html += '<div class="section"><div class="section-title">사이드 프로젝트 아이디어</div>';
        for (const item of sections.ideas) {
          html += '<div class="todo-item"><div class="todo-check"></div>' +
            '<div class="todo-text">' + escapeHtml(item.text) + '</div></div>';
        }
        html += '</div>';
      }

      if (!html) html = '<div class="empty">할일이 없습니다.</div>';
      contentEl.innerHTML = html;
    }

    function escapeHtml(s) {
      return (s || '').replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    loadIndex();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할일 - 강대종</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #FFFFFF;
      color: #191F28;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      padding: 32px 16px 80px;
      line-height: 1.7;
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 0 8px; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #E5E8EB;
    }
    header h1 { font-size: 22px; color: #3182F6; font-weight: 700; }
    header a { color: #4E5968; text-decoration: none; font-size: 14px; }
    header a:hover { color: #3182F6; }

    .lede {
      background: linear-gradient(135deg, #F0F9FF 0%, #F9FAFB 100%);
      border: 1px solid #DBEAFE;
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 24px;
      font-size: 14px;
      color: #4E5968;
    }
    .lede strong { color: #191F28; }
    .lede a { color: #3182F6; text-decoration: none; }
    .lede a:hover { text-decoration: underline; }

    .todo-list { display: flex; flex-direction: column; gap: 10px; }
    .todo {
      background: #F9FAFB; border: 1px solid #E5E8EB;
      border-radius: 12px; padding: 14px 16px;
    }
    .todo-text {
      font-size: 14px; color: #191F28; line-height: 1.55;
      word-break: keep-all; overflow-wrap: break-word;
    }
    .todo-date {
      font-size: 11px; color: #8B95A1; margin-top: 6px;
    }

    .drawer {
      margin-top: 28px; border-top: 1px solid #E5E8EB; padding-top: 20px;
    }
    .drawer-toggle {
      background: transparent; border: 1px solid #E5E8EB;
      color: #4E5968; font-size: 13px; font-weight: 500;
      padding: 10px 16px; border-radius: 10px; cursor: pointer;
      width: 100%; text-align: left; transition: all 0.15s;
      font-family: inherit;
      display: flex; align-items: center; justify-content: space-between;
    }
    .drawer-toggle:hover { border-color: #B0B8C1; color: #191F28; }
    .drawer-toggle .arrow { transition: transform 0.2s; }
    .drawer.open .drawer-toggle .arrow { transform: rotate(90deg); }
    .drawer-content {
      display: none; margin-top: 12px;
      flex-direction: column; gap: 8px;
    }
    .drawer.open .drawer-content { display: flex; }
    .snap-item {
      background: #F9FAFB; border: 1px solid #E5E8EB;
      border-radius: 10px; padding: 10px 14px; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      transition: all 0.15s; font-size: 13px;
    }
    .snap-item:hover { border-color: #D1D6DB; }
    .snap-item.active { border-color: #3182F6; background: #DCE9FA; }
    .snap-date { color: #191F28; font-weight: 600; }
    .snap-rel {
      font-size: 10px; color: #3182F6;
      background: rgba(49, 130, 246, 0.12);
      padding: 2px 8px; border-radius: 8px;
      border: 1px solid rgba(49, 130, 246, 0.3);
    }

    .loading { color: #8B95A1; text-align: center; padding: 40px 0; font-size: 14px; font-style: italic; }
    .error { color: #F04452; text-align: center; padding: 40px 0; font-size: 14px; }
    .empty { color: #8B95A1; text-align: center; padding: 40px 0; font-size: 13px; }

    .back {
      display: inline-block; margin-top: 28px; color: #4E5968;
      text-decoration: none; font-size: 14px;
    }
    .back:hover { color: #3182F6; }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>
<body>
  <div class="wrap">
    <header>
      <h1>할일</h1>
      <a href="./">← 홈으로</a>
    </header>

    <div class="lede">
      <strong>지금 해야 하는 일들.</strong> <a href="./parking-lot.html">손이 가면</a> 과 분리해 우선순위 노이즈 없이 처리하는 항목만 모았습니다. 끝나면 <a href="./done.html">완료</a>로, 못 하게 되면 <a href="./cancelled.html">취소</a>로 이동.
    </div>

    <div id="view">
      <div class="loading">불러오는 중…</div>
    </div>

    <a class="back" href="./">← 홈으로 돌아가기</a>
  </div>

  <script>
    const viewEl = document.getElementById('view');

    function parseDate(s) {
      const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!m) return null;
      return new Date(+m[1], +m[2] - 1, +m[3]);
    }

    function todayKST() {
      const now = new Date();
      const kst = new Date(now.getTime() + (now.getTimezoneOffset() + 540) * 60000);
      kst.setHours(0, 0, 0, 0);
      return kst;
    }

    function relativeDay(dateStr) {
      const d = parseDate(dateStr);
      if (!d) return '';
      const diff = Math.round((todayKST() - d) / 86400000);
      if (diff === 0) return '오늘';
      if (diff === 1) return '어제';
      if (diff < 7) return diff + '일 전';
      if (diff < 30) return Math.floor(diff / 7) + '주 전';
      return Math.floor(diff / 30) + '달 전';
    }

    function escapeHtml(s) {
      return (s || '').replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function parseInprogress(md) {
      const items = [];
      let inSection = false;
      for (const line of md.split('\n')) {
        const trimmed = line.trim();
        if (/^## 진행중/.test(trimmed)) { inSection = true; continue; }
        if (/^##/.test(trimmed)) { inSection = false; continue; }
        if (!inSection) continue;
        const m = trimmed.match(/^- \[( |x|X)\]\s*(.+)$/);
        if (!m) continue;
        if (m[1].toLowerCase() === 'x') continue;
        let text = m[2].replace(/⭐\s*/g, '');
        const dm = text.match(/\(추가:\s*([^,)]+)(?:,\s*완료:\s*([^)]+))?\)/);
        let added = '';
        if (dm) {
          added = (dm[1] || '').trim();
          text = text.replace(dm[0], '').trim();
        }
        items.push({ text, added });
      }
      return items;
    }

    const state = {
      versions: [],
      currentVersion: null,
      items: [],
      drawerOpen: false,
    };

    async function init() {
      try {
        const res = await fetch('./todos/index.json?_=' + Date.now());
        const data = await res.json();
        const raw = data.entries || data.versions || [];
        state.versions = raw.slice().sort((a, b) => b.date.localeCompare(a.date));
        if (state.versions.length === 0) {
          viewEl.innerHTML = '<div class="empty">스냅샷이 없습니다.</div>';
          return;
        }
        await loadVersion(state.versions[0]);
      } catch (e) {
        viewEl.innerHTML = '<div class="error">인덱스를 불러오지 못했습니다.</div>';
      }
    }

    async function loadVersion(version) {
      state.currentVersion = version;
      try {
        const res = await fetch('./todos/' + version.file + '?_=' + Date.now());
        const text = await res.text();
        state.items = parseInprogress(text);
        render();
      } catch (e) {
        viewEl.innerHTML = '<div class="error">파일을 불러오지 못했습니다.</div>';
      }
    }

    function render() {
      let listHtml = '<div class="todo-list">';
      if (state.items.length === 0) {
        listHtml += '<div class="empty">진행중인 할일이 없습니다.</div>';
      } else {
        for (const it of state.items) {
          listHtml += '<div class="todo">';
          listHtml += '<div class="todo-text">' + escapeHtml(it.text) + '</div>';
          if (it.added) {
            const ds = (function () {
              const d = parseDate(it.added);
              if (!d) return null;
              return Math.round((todayKST() - d) / 86400000);
            })();
            const suffix = ds === 0 ? '오늘 추가'
              : ds === 1 ? '어제 추가'
              : ds !== null ? ds + '일 전 추가'
              : '추가 ' + it.added;
            listHtml += '<div class="todo-date">' + suffix + '</div>';
          }
          listHtml += '</div>';
        }
      }
      listHtml += '</div>';

      let drawerHtml = '';
      if (state.versions.length > 1) {
        const openCls = state.drawerOpen ? ' open' : '';
        drawerHtml += '<div class="drawer' + openCls + '" id="drawer">';
        drawerHtml +=
          '<button class="drawer-toggle" id="drawer-toggle">' +
          '<span>📜 이전 스냅샷 ' + (state.versions.length - 1) + '개</span>' +
          '<span class="arrow">›</span>' +
          '</button>';
        drawerHtml += '<div class="drawer-content">';
        for (const v of state.versions) {
          const active = v.file === state.currentVersion.file ? ' active' : '';
          drawerHtml +=
            '<div class="snap-item' + active + '" data-file="' + v.file + '">' +
            '<span class="snap-date">' + v.date + '</span>' +
            '<span class="snap-rel">' + relativeDay(v.date) + '</span>' +
            '</div>';
        }
        drawerHtml += '</div></div>';
      }

      viewEl.innerHTML = listHtml + drawerHtml;
      bindEvents();
    }

    function bindEvents() {
      const toggle = document.getElementById('drawer-toggle');
      if (toggle) {
        toggle.addEventListener('click', () => {
          state.drawerOpen = !state.drawerOpen;
          const drawer = document.getElementById('drawer');
          if (drawer) drawer.classList.toggle('open', state.drawerOpen);
        });
      }
      viewEl.querySelectorAll('[data-file]').forEach(el => {
        el.addEventListener('click', () => {
          const file = el.dataset.file;
          const v = state.versions.find(x => x.file === file);
          if (v) loadVersion(v);
        });
      });
    }

    init();
  </script>
</body>
</html>

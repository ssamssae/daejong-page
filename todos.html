<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할일 목록 - 강대종</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      padding: 32px 16px 80px;
      line-height: 1.7;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid #2a2a2a;
    }
    header h1 {
      font-size: 22px;
      color: #ffd54f;
      font-weight: 700;
    }
    header a {
      color: #9e9e9e;
      text-decoration: none;
      font-size: 14px;
    }
    header a:hover { color: #ffd54f; }
    .section {
      margin-bottom: 28px;
    }
    .section-title {
      font-size: 16px;
      color: #ffd54f;
      font-weight: 700;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2a2a2a;
    }
    .todo-item {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 8px;
      border: 1px solid #2a2a2a;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .todo-item.done {
      opacity: 0.5;
    }
    .todo-item.priority {
      border-color: #ffd54f;
      background: #2a2515;
    }
    .todo-check {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border-radius: 5px;
      border: 2px solid #555;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .todo-item.done .todo-check {
      border-color: #4caf50;
      background: #4caf50;
    }
    .todo-check-mark {
      display: none;
      color: #fff;
      font-size: 13px;
      font-weight: bold;
    }
    .todo-item.done .todo-check-mark {
      display: block;
    }
    .todo-text {
      flex: 1;
      font-size: 14px;
      color: #d0d0d0;
    }
    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: #777;
    }
    .todo-date {
      font-size: 11px;
      color: #777;
      margin-top: 4px;
    }
    .todo-star {
      color: #ffd54f;
      margin-right: 4px;
    }
    .empty {
      color: #555;
      font-size: 14px;
      padding: 16px;
      text-align: center;
    }
    .updated {
      text-align: center;
      color: #555;
      font-size: 12px;
      margin-top: 32px;
    }
    .back {
      display: inline-block;
      margin-top: 24px;
      color: #9e9e9e;
      text-decoration: none;
      font-size: 14px;
    }
    .back:hover { color: #ffd54f; }
    .loading { color: #666; font-style: italic; }
    .error { color: #ef5350; }
    .version-history {
      margin-top: 16px;
    }
    .version-link {
      display: inline-block;
      color: #9e9e9e;
      text-decoration: none;
      font-size: 12px;
      margin-right: 12px;
      padding: 4px 10px;
      border-radius: 12px;
      border: 1px solid #333;
      transition: all 0.2s;
    }
    .version-link:hover {
      color: #ffd54f;
      border-color: #ffd54f;
    }
    .version-link.active {
      color: #ffd54f;
      border-color: #ffd54f;
      background: #2a2515;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>할일 목록</h1>
      <a href="./">← 홈으로</a>
    </header>
    <div id="app">
      <div class="loading">불러오는 중...</div>
    </div>
    <div class="version-history" id="versions"></div>
    <a class="back" href="./">← 홈으로 돌아가기</a>
  </div>
  <script>
    const appEl = document.getElementById('app');
    const versionsEl = document.getElementById('versions');

    async function loadTodos() {
      try {
        const res = await fetch('./todos/index.json?_=' + Date.now());
        const data = await res.json();
        const versions = (data.versions || []).sort((a, b) => b.file.localeCompare(a.file));

        if (versions.length === 0) {
          appEl.innerHTML = '<div class="empty">할일 데이터가 없습니다.</div>';
          return;
        }

        renderVersions(versions);
        loadVersion(versions[0].file);
      } catch (e) {
        appEl.innerHTML = '<div class="error">할일 목록을 불러오지 못했습니다.</div>';
      }
    }

    function renderVersions(versions) {
      versionsEl.innerHTML = '';
      for (const v of versions) {
        const a = document.createElement('a');
        a.className = 'version-link';
        a.href = '#';
        a.textContent = v.date + ' ' + (v.version || '');
        a.addEventListener('click', (e) => {
          e.preventDefault();
          document.querySelectorAll('.version-link').forEach(el => el.classList.remove('active'));
          a.classList.add('active');
          loadVersion(v.file);
        });
        versionsEl.appendChild(a);
      }
      if (versionsEl.firstChild) versionsEl.firstChild.classList.add('active');
    }

    async function loadVersion(file) {
      appEl.innerHTML = '<div class="loading">불러오는 중...</div>';
      try {
        const res = await fetch('./todos/' + file + '?_=' + Date.now());
        const text = await res.text();
        renderTodos(text);
      } catch (e) {
        appEl.innerHTML = '<div class="error">파일을 불러오지 못했습니다.</div>';
      }
    }

    function renderTodos(md) {
      const sections = { inprogress: [], done: [], hold: [], ideas: [] };
      let current = null;

      for (const line of md.split('\n')) {
        const trimmed = line.trim();
        if (/^## 진행중/.test(trimmed)) { current = 'inprogress'; continue; }
        if (/^## 완료/.test(trimmed)) { current = 'done'; continue; }
        if (/^## 보류|^## 취소/.test(trimmed)) { current = 'hold'; continue; }
        if (/^## 사이드/.test(trimmed)) { current = 'ideas'; continue; }
        if (/^#/.test(trimmed)) { current = null; continue; }

        if (current && /^- \[/.test(trimmed)) {
          const isDone = /^- \[x\]/.test(trimmed);
          const isPriority = trimmed.includes('\u2B50') || trimmed.includes('\u{2B50}');
          let text = trimmed.replace(/^- \[.\]\s*/, '').replace(/\u2B50\s*/g, '');
          const dateMatch = text.match(/\(추가:\s*([^,)]+)(?:,\s*완료:\s*([^)]+))?\)/);
          let addedDate = '';
          let doneDate = '';
          if (dateMatch) {
            addedDate = dateMatch[1];
            doneDate = dateMatch[2] || '';
            text = text.replace(dateMatch[0], '').trim();
          }
          sections[current].push({ text, isDone, isPriority, addedDate, doneDate });
        }
      }

      let html = '';

      if (sections.inprogress.length > 0) {
        html += '<div class="section"><div class="section-title">진행중</div>';
        for (const item of sections.inprogress) {
          const cls = item.isPriority ? 'todo-item priority' : 'todo-item';
          html += '<div class="' + cls + '">' +
            '<div class="todo-check"><span class="todo-check-mark">✓</span></div>' +
            '<div><div class="todo-text">' + (item.isPriority ? '<span class="todo-star">★</span>' : '') + escapeHtml(item.text) + '</div>' +
            (item.addedDate ? '<div class="todo-date">추가: ' + item.addedDate + '</div>' : '') +
            '</div></div>';
        }
        html += '</div>';
      }

      if (sections.done.length > 0) {
        html += '<div class="section"><div class="section-title">완료</div>';
        for (const item of sections.done) {
          html += '<div class="todo-item done">' +
            '<div class="todo-check"><span class="todo-check-mark">✓</span></div>' +
            '<div><div class="todo-text">' + escapeHtml(item.text) + '</div>' +
            (item.doneDate ? '<div class="todo-date">완료: ' + item.doneDate + '</div>' : '') +
            '</div></div>';
        }
        html += '</div>';
      }

      if (sections.hold.length > 0) {
        html += '<div class="section"><div class="section-title">보류/취소</div>';
        for (const item of sections.hold) {
          html += '<div class="todo-item"><div class="todo-check"></div>' +
            '<div class="todo-text">' + escapeHtml(item.text) + '</div></div>';
        }
        html += '</div>';
      }

      if (sections.ideas.length > 0) {
        html += '<div class="section"><div class="section-title">사이드 프로젝트 아이디어</div>';
        for (const item of sections.ideas) {
          html += '<div class="todo-item"><div class="todo-check"></div>' +
            '<div class="todo-text">' + escapeHtml(item.text) + '</div></div>';
        }
        html += '</div>';
      }

      if (!html) {
        html = '<div class="empty">할일이 없습니다.</div>';
      }

      appEl.innerHTML = html;
    }

    function escapeHtml(s) {
      return (s || '').replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    loadTodos();
  </script>
</body>
</html>

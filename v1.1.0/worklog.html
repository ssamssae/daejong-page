<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>작업일지 - 강대종</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      padding: 32px 16px 80px;
      line-height: 1.7;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid #2a2a2a;
    }
    header h1 {
      font-size: 22px;
      color: #ffd54f;
      font-weight: 700;
    }
    header a {
      color: #9e9e9e;
      text-decoration: none;
      font-size: 14px;
    }
    header a:hover { color: #ffd54f; }
    .entry-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 32px;
    }
    .entry-list li {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 16px 20px;
      cursor: pointer;
      transition: background 0.2s;
      border: 1px solid #2a2a2a;
    }
    .entry-list li:hover { background: #262626; }
    .entry-list li.active {
      background: #2a2515;
      border-color: #ffd54f;
    }
    .entry-date {
      font-size: 12px;
      color: #9e9e9e;
      margin-bottom: 4px;
    }
    .entry-title {
      font-size: 16px;
      color: #e0e0e0;
      font-weight: 600;
    }
    .entry-version {
      font-size: 11px;
      color: #ffd54f;
      background: #2a2515;
      padding: 2px 8px;
      border-radius: 10px;
      display: inline-block;
      margin-left: 8px;
    }
    .content {
      background: #1e1e1e;
      border-radius: 16px;
      padding: 32px 28px;
      min-height: 200px;
      white-space: pre-wrap;
      word-break: keep-all;
      overflow-wrap: break-word;
      font-size: 15px;
      color: #d0d0d0;
    }
    .content:empty::before {
      content: "위 목록에서 작업일지를 선택해주세요.";
      color: #666;
    }
    .content h1, .content h2, .content h3 {
      color: #ffd54f;
      margin-bottom: 12px;
    }
    .content h1 { font-size: 20px; }
    .content p { margin-bottom: 12px; }
    .back {
      display: inline-block;
      margin-top: 24px;
      color: #9e9e9e;
      text-decoration: none;
      font-size: 14px;
    }
    .back:hover { color: #ffd54f; }
    .loading { color: #666; font-style: italic; }
    .error { color: #ef5350; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>작업일지</h1>
      <a href="./">← 홈으로</a>
    </header>
    <ul class="entry-list" id="entries"></ul>
    <div class="content" id="content"></div>
    <a class="back" href="./">← 홈으로 돌아가기</a>
  </div>
  <script>
    const entriesEl = document.getElementById('entries');
    const contentEl = document.getElementById('content');
    let activeLi = null;

    async function loadIndex() {
      try {
        const res = await fetch('./worklog/index.json?_=' + Date.now());
        const data = await res.json();
        renderList(data.entries || []);
      } catch (e) {
        entriesEl.innerHTML = '<li class="error">작업일지 인덱스를 불러오지 못했습니다.</li>';
      }
    }

    function renderList(entries) {
      entries.sort((a, b) => {
        if (a.date !== b.date) return b.date.localeCompare(a.date);
        return (b.version || '').localeCompare(a.version || '');
      });
      entriesEl.innerHTML = '';
      for (const e of entries) {
        const li = document.createElement('li');
        li.innerHTML =
          '<div class="entry-date">' + e.date + '</div>' +
          '<div class="entry-title">' + escapeHtml(e.title || e.file) +
          '<span class="entry-version">' + (e.version || '') + '</span></div>';
        li.addEventListener('click', () => loadEntry(e, li));
        entriesEl.appendChild(li);
      }
      if (entries.length > 0) {
        const first = entriesEl.firstChild;
        loadEntry(entries[0], first);
      }
    }

    async function loadEntry(entry, li) {
      if (activeLi) activeLi.classList.remove('active');
      li.classList.add('active');
      activeLi = li;
      contentEl.innerHTML = '<span class="loading">불러오는 중…</span>';
      try {
        const res = await fetch('./worklog/' + entry.file + '?_=' + Date.now());
        const text = await res.text();
        contentEl.textContent = text;
      } catch (e) {
        contentEl.innerHTML = '<span class="error">파일을 불러오지 못했습니다.</span>';
      }
    }

    function escapeHtml(s) {
      return (s || '').replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    loadIndex();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>강대종 - 개발자 소개</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #1e1e1e;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    .photo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #333;
      margin-bottom: 24px;
    }
    .name {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 12px;
    }
    .bio {
      font-size: 15px;
      line-height: 1.6;
      color: #aaa;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #ffd54f;
      color: #1e1e1e;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 30px;
      transition: background 0.2s, transform 0.2s;
    }
    .btn:hover {
      background: #ffca28;
      transform: translateY(-2px);
    }
    .btn svg {
      width: 18px;
      height: 18px;
      fill: #1e1e1e;
    }
      .btns {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-ghost {
      background: transparent;
      color: #ffd54f;
      border: 2px solid #ffd54f;
      padding: 10px 26px;
    }
    .btn-ghost svg { fill: #ffd54f; }
    .btn-ghost:hover {
      background: #ffd54f;
      color: #1e1e1e;
    }
    .btn-ghost:hover svg { fill: #1e1e1e; }
      .worklog-link {
      display: inline-block;
      margin-top: 20px;
      color: #9e9e9e;
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s;
    }
    .worklog-link:hover { color: #ffd54f; }
      .since {
      display: inline-block;
      margin-top: 6px;
      font-size: 12px;
      color: #9e9e9e;
      letter-spacing: 0.3px;
    }
  </style>
</head>

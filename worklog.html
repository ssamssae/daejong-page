<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>작업일지 - 강대종</title>
  <meta name="description" content="하루치 작업을 뉴스레터 톤으로 풀어 쓴 일지. 메모요·더치페이·자동화·스킬 구축 전 과정의 날것 기록.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #FFFFFF;
      color: #191F28;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      padding: 32px 16px 80px;
      line-height: 1.7;
    }
    .wrap { max-width: 760px; margin: 0 auto; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px; padding-bottom: 16px;
      border-bottom: 1px solid #E5E8EB;
    }
    header h1 { font-size: 22px; color: #3182F6; font-weight: 700; }
    header a { color: #4E5968; text-decoration: none; font-size: 14px; }
    header a:hover { color: #3182F6; }

    .hero {
      background: linear-gradient(135deg, #FFFFFF 0%, #F9FAFB 100%);
      border: 1px solid #E5E8EB;
      border-radius: 16px;
      padding: 28px 28px 24px;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: "";
      position: absolute; top: -30px; right: -30px;
      width: 140px; height: 140px; border-radius: 50%;
      background: radial-gradient(circle, rgba(49, 130, 246, 0.15) 0%, rgba(49, 130, 246, 0) 70%);
    }
    .hero h2 {
      font-size: 22px; color: #191F28; font-weight: 800;
      margin-bottom: 10px; line-height: 1.35;
    }
    .hero p {
      font-size: 14px; color: #4E5968; line-height: 1.7;
    }
    .hero .tagline {
      color: #3182F6; font-size: 12px; font-weight: 700;
      margin-bottom: 6px; letter-spacing: 0.8px;
    }

    .section-title {
      font-size: 13px; color: #3182F6; font-weight: 700;
      margin-bottom: 14px; letter-spacing: 0.5px;
      padding-left: 4px;
    }

    .feed { display: flex; flex-direction: column; gap: 14px; }

    .entry {
      background: #FFFFFF;
      border: 1px solid #E5E8EB;
      border-radius: 12px;
      padding: 20px 22px;
      transition: border-color 0.15s ease, transform 0.15s ease;
      display: block;
      text-decoration: none;
      color: inherit;
    }
    .entry:hover {
      border-color: #3182F6;
      transform: translateY(-2px);
    }
    .entry.today { border-color: rgba(49, 130, 246, 0.35); background: linear-gradient(135deg, #F9FAFB 0%, #F9FAFB 100%); }

    .entry-head {
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px; flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .entry-date-wrap { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .entry-date { font-size: 13px; color: #3182F6; font-weight: 700; }
    .entry-relative { font-size: 11px; color: #8B95A1; }
    .entry-version {
      font-size: 10px; color: #3182F6;
      background: rgba(49, 130, 246, 0.12);
      padding: 3px 9px; border-radius: 10px;
      border: 1px solid rgba(49, 130, 246, 0.3);
      font-weight: 700; letter-spacing: 0.3px;
    }

    .entry-title {
      font-size: 17px; color: #191F28; font-weight: 700;
      margin-bottom: 6px; line-height: 1.4;
    }
    .entry-subtitle {
      font-size: 13px; color: #4E5968; line-height: 1.6;
      margin-bottom: 12px;
    }

    .entry-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
    .tag {
      font-size: 10px; padding: 2px 8px; border-radius: 8px;
      background: #E5E8EB; color: #4E5968; border: 1px solid #E5E8EB;
    }
    .tag.flutter { border-color: #3182F6; color: #3182F6; }
    .tag.ai { border-color: #3182F6; color: #3182F6; }
    .tag.web { border-color: #22C55E; color: #22C55E; }
    .tag.infra { border-color: #A855F7; color: #A855F7; }
    .tag.ios { border-color: #8B95A1; color: #8B95A1; }
    .tag.android { border-color: #22C55E; color: #22C55E; }
    .tag.release { border-color: #F97316; color: #F97316; }

    .entry-meta {
      display: flex; gap: 10px; align-items: center;
      font-size: 11px; color: #8B95A1;
      margin-top: 4px;
    }
    .entry-read-more { color: #3182F6; font-weight: 600; }

    .loading, .error, .empty {
      color: #8B95A1; text-align: center; padding: 30px; font-size: 13px; font-style: italic;
    }
    .error { color: #F04452; }

    footer {
      margin-top: 48px;
      padding-top: 20px;
      border-top: 1px solid #E5E8EB;
      color: #8B95A1;
      font-size: 12px;
      text-align: center;
    }
    footer a { color: #4E5968; text-decoration: none; }
    footer a:hover { color: #3182F6; }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>
<body>
  <div class="wrap">
    <header>
      <h1>작업일지</h1>
      <a href="./">← 홈으로</a>
    </header>

    <section class="hero">
      <div class="tagline">DAILY WORKLOG</div>
      <h2>하루치 작업을 뉴스레터 톤으로 풀어 쓴 일지</h2>
      <p>그날 막힌 지점·뒤집힌 결정·잡은 버그·발행한 결과물을 시간 순서대로 기록한다. 카드 하나가 하루. 제목 옆 버전 배지는 같은 날 몇 번째 스냅샷인지 표시.</p>
    </section>

    <div class="section-title">최근 일지</div>

    <div class="feed" id="feed">
      <div class="loading">불러오는 중…</div>
    </div>

    <footer>
      <a href="./index.html">홈</a> · <a href="./newsletter.html">뉴스레터</a> · <a href="./portfolio.html">포트폴리오</a> · <a href="https://github.com/ssamssae/daejong-page" target="_blank" rel="noopener">GitHub</a>
    </footer>
  </div>

  <script>
    const feedEl = document.getElementById('feed');

    const TAG_KEYWORDS = {
      'flutter': ['flutter','dart','위젯','안드로이드 앱','ios 앱','메모요','앱 빌드','빌드'],
      'ios': ['iOS','TestFlight','App Store','Xcode','ipa','App Store Connect'],
      'android': ['Android','Google Play','Play Console','aab','apk'],
      'web': ['홈페이지','daejong-page','HTML','CSS','포트폴리오'],
      'ai': ['Claude','AI','GPT','스킬'],
      'infra': ['텔레그램','자동화','launchd','스킬','워커','인프라','Playwright'],
      'release': ['출시','심사','제출','베타','베타테스터','Closed Testing','사전예약']
    };

    function detectTags(text) {
      var found = {};
      for (var key in TAG_KEYWORDS) {
        var words = TAG_KEYWORDS[key];
        for (var i = 0; i < words.length; i++) {
          if (text.indexOf(words[i]) !== -1) { found[key] = true; break; }
        }
      }
      var order = ['flutter','ios','android','web','ai','infra','release'];
      var labels = { flutter:'Flutter', ios:'iOS', android:'Android', web:'Web', ai:'AI', infra:'자동화', release:'출시' };
      return order.filter(function(k) { return found[k]; }).map(function(k) { return { cls: k, label: labels[k] }; });
    }

    function relativeDate(dateStr) {
      try {
        var d = new Date(dateStr + 'T00:00:00');
        var today = new Date(); today.setHours(0,0,0,0);
        var diff = Math.round((today - d) / 86400000);
        if (diff === 0) return '오늘';
        if (diff === 1) return '어제';
        if (diff < 7) return diff + '일 전';
        if (diff < 30) return Math.floor(diff / 7) + '주 전';
        return Math.floor(diff / 30) + '달 전';
      } catch (e) { return ''; }
    }

    function escapeHtml(s) {
      return (s || '').replace(/[&<>"']/g, function(c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }

    // 첫 블록쿼트의 첫 줄(> 로 시작하는 줄) 또는 첫 문단 문장을 서브타이틀로 뽑는다.
    function extractSubtitle(text) {
      if (!text) return '';
      var lines = text.split('\n');
      for (var i = 0; i < lines.length; i++) {
        var t = lines[i].trim();
        if (t.indexOf('> ') === 0) {
          return t.replace(/^>\s*\*?\*?/, '').replace(/\*\*/g, '').trim();
        }
      }
      // fallback: 첫 비어있지 않고 헤딩·구분선이 아닌 줄
      for (var j = 0; j < lines.length; j++) {
        var s = lines[j].trim();
        if (!s) continue;
        if (s.indexOf('#') === 0) continue;
        if (s.indexOf('---') === 0) continue;
        return s.slice(0, 160);
      }
      return '';
    }

    function estimateReadingTime(text) {
      if (!text) return '~';
      // 한글 기준 대략 400자/분
      var chars = text.replace(/\s+/g, '').length;
      var mins = Math.max(1, Math.round(chars / 400));
      return mins + '분';
    }

    function versionKey(v) {
      if (!v) return [0, 0, 0];
      var m = /^v?(\d+)\.(\d+)\.(\d+)/.exec(v);
      return m ? [+m[1], +m[2], +m[3]] : [0, 0, 0];
    }

    function pickLatestPerDate(entries) {
      // 날짜별 하나만 고른다: **가장 높은 semver 가 항상 이긴다.**
      //   · 버전 없는(versionless) 스탠드업 파일이나 legacy 파일은 v0.0.0 으로 취급
      //   · v1.1.0(뉴스레터 소급판) 이 v1.0.X 와 versionless 를 모두 이김
      var byDate = {};
      entries.forEach(function(e) {
        if (!byDate[e.date]) byDate[e.date] = [];
        byDate[e.date].push(e);
      });
      var result = [];
      Object.keys(byDate).forEach(function(date) {
        var group = byDate[date];
        group.sort(function(a, b) {
          var ka = versionKey(a.version), kb = versionKey(b.version);
          for (var i = 0; i < 3; i++) if (ka[i] !== kb[i]) return kb[i] - ka[i];
          return 0;
        });
        var picked = group[0];
        picked._versionCount = group.length;
        result.push(picked);
      });
      result.sort(function(a, b) { return b.date.localeCompare(a.date); });
      return result;
    }

    async function loadIndex() {
      try {
        var res = await fetch('./worklog/index.json?_=' + Date.now());
        var data = await res.json();
        var entries = data.entries || [];
        var filtered = pickLatestPerDate(entries);
        await renderFeed(filtered);
      } catch (e) {
        feedEl.innerHTML = '<div class="error">작업일지 인덱스를 불러오지 못했습니다.</div>';
      }
    }

    async function renderFeed(entries) {
      if (entries.length === 0) {
        feedEl.innerHTML = '<div class="empty">아직 작업일지가 없습니다.</div>';
        return;
      }
      feedEl.innerHTML = '';
      var nodes = [];
      for (var i = 0; i < entries.length; i++) {
        var e = entries[i];
        var isToday = relativeDate(e.date) === '오늘';
        var a = document.createElement('a');
        a.className = 'entry' + (isToday ? ' today' : '');
        a.href = './worklog/view.html?file=' + encodeURIComponent(e.file);
        var versionText = e.version ? escapeHtml(e.version) : '';
        if (e._versionCount > 1) {
          versionText += (versionText ? ' · ' : '') + e._versionCount + '판';
        }
        a.innerHTML =
          '<div class="entry-head">' +
            '<div class="entry-date-wrap">' +
              '<div class="entry-date">' + e.date + '</div>' +
              '<div class="entry-relative">' + relativeDate(e.date) + '</div>' +
            '</div>' +
            (versionText ? '<span class="entry-version">' + versionText + '</span>' : '') +
          '</div>' +
          '<div class="entry-title">' + escapeHtml(e.title || '(제목 없음)') + '</div>' +
          '<div class="entry-subtitle"><span class="loading" style="padding:0; font-style:normal;">불러오는 중…</span></div>' +
          '<div class="entry-tags"></div>' +
          '<div class="entry-meta"><span class="reading-time">~</span><span>·</span><span class="entry-read-more">읽기 →</span></div>';
        feedEl.appendChild(a);
        nodes.push({ a: a, entry: e });
      }

      // 본문 비동기 로드해서 subtitle + tags + reading time 주입
      await Promise.all(nodes.map(function(n) {
        return fetch('./worklog/' + n.entry.file + '?_=' + Date.now())
          .then(function(r) { return r.text(); })
          .then(function(text) {
            var subtitle = extractSubtitle(text);
            var tags = detectTags(text);
            var rt = estimateReadingTime(text);
            var subEl = n.a.querySelector('.entry-subtitle');
            if (subtitle) subEl.textContent = subtitle;
            else subEl.style.display = 'none';
            var tagsEl = n.a.querySelector('.entry-tags');
            tagsEl.innerHTML = tags.map(function(t) {
              return '<span class="tag ' + t.cls + '">' + t.label + '</span>';
            }).join('');
            n.a.querySelector('.reading-time').textContent = '읽는 시간 ' + rt;
          })
          .catch(function() {
            var subEl = n.a.querySelector('.entry-subtitle');
            subEl.innerHTML = '<span class="error" style="padding:0; font-style:normal;">본문 로드 실패</span>';
          });
      }));
    }

    loadIndex();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>작업일지 산문체 - 강대종</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      padding: 32px 16px 80px;
      line-height: 1.85;
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 0 24px; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; padding-bottom: 16px;
      border-bottom: 1px solid #2a2a2a; gap: 12px; flex-wrap: wrap;
    }
    header h1 {
      font-size: 20px; color: #ffd54f; font-weight: 700;
    }
    header a { color: #9e9e9e; text-decoration: none; font-size: 14px; }
    header a:hover { color: #ffd54f; }
    .meta {
      font-size: 13px; color: #9e9e9e; margin-bottom: 24px;
      padding: 12px 16px; background: #1a1a1a; border-radius: 10px;
      border-left: 3px solid #ffd54f;
      display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .meta .title { color: #e0e0e0; font-size: 14px; font-weight: 600; }
    .meta .version {
      font-size: 11px; color: #ffd54f;
      background: rgba(255, 213, 79, 0.12);
      padding: 3px 10px; border-radius: 10px;
      border: 1px solid rgba(255, 213, 79, 0.3); font-weight: 600;
    }
    .body {
      font-size: 15px; color: #d0d0d0; line-height: 1.9;
      white-space: pre-wrap; word-break: keep-all; overflow-wrap: break-word;
    }
    .toolbar {
      display: flex; gap: 8px; margin: 28px 0 20px; flex-wrap: wrap;
    }
    .btn {
      font-size: 13px; padding: 8px 14px; border-radius: 10px;
      background: #1a1a1a; color: #e0e0e0; border: 1px solid #2a2a2a;
      cursor: pointer; text-decoration: none; display: inline-block;
      font-family: inherit; transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover { background: #222; border-color: #3a3a3a; }
    .btn.primary { color: #ffd54f; border-color: rgba(255, 213, 79, 0.3); }
    .btn.primary:hover { background: rgba(255, 213, 79, 0.1); }
    .version-nav {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px;
    }
    .version-nav a {
      font-size: 11px; color: #aaa; padding: 4px 10px;
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px;
      text-decoration: none;
    }
    .version-nav a.active { color: #ffd54f; border-color: rgba(255, 213, 79, 0.5); background: rgba(255, 213, 79, 0.08); }
    .version-nav a:hover { border-color: #3a3a3a; }
    .loading, .error { color: #666; text-align: center; padding: 40px; font-size: 14px; }
    .error { color: #ef5350; }
    .back { display: inline-block; margin-top: 28px; color: #9e9e9e; text-decoration: none; font-size: 14px; }
    .back:hover { color: #ffd54f; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1 id="pageTitle">작업일지 산문체</h1>
      <a href="../worklog.html">← 피드로</a>
    </header>

    <div class="meta" id="meta" style="display:none;">
      <span class="title" id="metaTitle"></span>
      <span class="version" id="metaVersion"></span>
    </div>

    <div class="version-nav" id="versionNav"></div>

    <div class="toolbar" id="toolbar" style="display:none;">
      <button class="btn primary" id="copyBtn">본문 복사</button>
      <a class="btn" id="githubLink" target="_blank" rel="noopener">GitHub 원본 ↗</a>
    </div>

    <div class="body" id="body"><div class="loading">불러오는 중…</div></div>

    <a class="back" href="../worklog.html">← 피드로 돌아가기</a>
  </div>

  <script>
    var params = new URLSearchParams(location.search);
    var file = params.get('file');

    var bodyEl = document.getElementById('body');
    var metaEl = document.getElementById('meta');
    var metaTitleEl = document.getElementById('metaTitle');
    var metaVersionEl = document.getElementById('metaVersion');
    var pageTitleEl = document.getElementById('pageTitle');
    var toolbarEl = document.getElementById('toolbar');
    var versionNavEl = document.getElementById('versionNav');
    var copyBtn = document.getElementById('copyBtn');
    var githubLink = document.getElementById('githubLink');

    function parseFileName(name) {
      var m = /^(\d{4}-\d{2}-\d{2})(?:_(v\d+\.\d+\.\d+|legacy))?\.md$/.exec(name);
      if (!m) return null;
      return { date: m[1], version: m[2] || '' };
    }

    function versionLabel(v) {
      if (v === 'legacy') return 'legacy';
      if (!v) return '최신';
      return v;
    }

    async function loadVersionNav(date, currentFile) {
      try {
        var res = await fetch('./index.json?_=' + Date.now());
        var data = await res.json();
        // view.html 은 "산문체 뷰어" — 버전 없는 통합 파일은 스탠드업 불릿 포맷이라 nav 에서 제외
        var entries = (data.entries || []).filter(function(e) {
          if (e.date !== date) return false;
          if (!e.version || e.version === '') return false; // 통합(스탠드업) 제외
          return true;
        });
        if (entries.length <= 1) return;
        entries.sort(function(a, b) {
          var va = a.version || '';
          var vb = b.version || '';
          // legacy 는 맨 뒤
          if (va === 'legacy' && vb !== 'legacy') return 1;
          if (vb === 'legacy' && va !== 'legacy') return -1;
          // v-번호는 내림차순 (최신이 앞)
          return vb.localeCompare(va);
        });
        versionNavEl.innerHTML = entries.map(function(e) {
          var label = versionLabel(e.version || '');
          var active = e.file === currentFile ? ' active' : '';
          return '<a class="' + active.trim() + '" href="?file=' + encodeURIComponent(e.file) + '">' + label + '</a>';
        }).join('');
      } catch (e) { /* silent */ }
    }

    async function load() {
      if (!file) {
        bodyEl.innerHTML = '<div class="error">파일이 지정되지 않았습니다. URL 에 ?file=... 파라미터가 필요해요.</div>';
        return;
      }
      var parsed = parseFileName(file);
      if (!parsed) {
        bodyEl.innerHTML = '<div class="error">파일명 형식을 인식할 수 없어요: ' + file + '</div>';
        return;
      }

      try {
        var res = await fetch('./' + file + '?_=' + Date.now());
        if (!res.ok) throw new Error('fetch failed');
        var text = await res.text();

        pageTitleEl.textContent = parsed.date + (parsed.version ? ' · ' + parsed.version : '') + ' 작업일지';
        document.title = parsed.date + ' 작업일지 - 강대종';

        var firstLine = text.split('\n').map(function(l) { return l.trim(); }).filter(function(l) { return l; })[0] || '';
        var firstParagraph = text.split('\n\n').map(function(p) { return p.trim(); }).filter(function(p) { return p; })[1] || '';
        metaTitleEl.textContent = firstParagraph.slice(0, 80) + (firstParagraph.length > 80 ? '…' : '');
        metaVersionEl.textContent = versionLabel(parsed.version);
        metaEl.style.display = 'flex';

        bodyEl.textContent = text;
        toolbarEl.style.display = 'flex';
        githubLink.href = 'https://github.com/ssamssae/daejong-page/blob/main/worklog/' + file;

        copyBtn.onclick = function() {
          navigator.clipboard.writeText(text).then(function() {
            copyBtn.textContent = '복사됨';
            setTimeout(function() { copyBtn.textContent = '본문 복사'; }, 1500);
          }).catch(function() {
            copyBtn.textContent = '복사 실패';
            setTimeout(function() { copyBtn.textContent = '본문 복사'; }, 1500);
          });
        };

        loadVersionNav(parsed.date, file);
      } catch (e) {
        bodyEl.innerHTML = '<div class="error">본문을 불러올 수 없어요: ' + file + '</div>';
      }
    }

    load();
  </script>
</body>
</html>

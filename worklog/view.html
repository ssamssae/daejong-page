<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>작업일지 뉴스레터 - 강대종</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #FFFFFF;
      color: #191F28;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      padding: 32px 16px 80px;
      line-height: 1.85;
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 0 24px; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; padding-bottom: 16px;
      border-bottom: 1px solid #E5E8EB; gap: 12px; flex-wrap: wrap;
    }
    header h1 {
      font-size: 20px; color: #3182F6; font-weight: 700;
    }
    header a { color: #4E5968; text-decoration: none; font-size: 14px; }
    header a:hover { color: #3182F6; }
    .meta {
      font-size: 13px; color: #4E5968; margin-bottom: 24px;
      padding: 12px 16px; background: #F9FAFB; border-radius: 10px;
      border-left: 3px solid #3182F6;
      display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .meta .title { color: #191F28; font-size: 14px; font-weight: 600; }
    .meta .version {
      font-size: 11px; color: #3182F6;
      background: rgba(49, 130, 246, 0.12);
      padding: 3px 10px; border-radius: 10px;
      border: 1px solid rgba(49, 130, 246, 0.3); font-weight: 600;
    }
    .body {
      font-size: 15px; color: #191F28; line-height: 1.9;
      word-break: keep-all; overflow-wrap: break-word;
    }
    .body h1, .body h2, .body h3, .body h4 {
      color: #3182F6; font-weight: 700;
      margin: 22px 0 10px; line-height: 1.35;
    }
    .body h1 { font-size: 24px; margin-top: 8px; }
    .body h2 { font-size: 18px; }
    .body h3 { font-size: 16px; }
    .body h4 { font-size: 15px; }
    .body p { margin: 0 0 14px; }
    .body blockquote {
      border-left: 4px solid #3182F6;
      padding: 10px 18px; margin: 14px 0;
      color: #191F28;
      background: rgba(49, 130, 246, 0.06);
      border-radius: 0 10px 10px 0;
    }
    .body blockquote p { margin: 0 0 6px; }
    .body blockquote p:last-child { margin: 0; }
    .body code {
      background: #F2F4F6; color: #3182F6;
      padding: 2px 7px; border-radius: 5px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
    }
    .body pre {
      background: #F2F4F6; color: #191F28;
      padding: 14px 16px; border-radius: 10px;
      overflow-x: auto; margin: 14px 0;
      border: 1px solid #E5E8EB;
      font-size: 13px; line-height: 1.55;
    }
    .body pre code { background: transparent; color: inherit; padding: 0; font-size: 13px; }
    .body strong { color: #191F28; font-weight: 700; }
    .body em { color: #191F28; }
    .body a { color: #3182F6; text-decoration: underline; }
    .body a:hover { color: #5B9BF8; }
    .body ul, .body ol { padding-left: 24px; margin: 10px 0; }
    .body li { margin: 5px 0; }
    .body table {
      border-collapse: collapse; margin: 14px 0;
      font-size: 13px; width: 100%;
    }
    .body th, .body td {
      border: 1px solid #E5E8EB; padding: 7px 11px;
      text-align: left;
    }
    .body th { background: #F9FAFB; color: #3182F6; }
    .body hr { border: none; border-top: 1px solid #E5E8EB; margin: 22px 0; }
    .toolbar {
      display: flex; gap: 8px; margin: 28px 0 20px; flex-wrap: wrap;
    }
    .btn {
      font-size: 13px; padding: 8px 14px; border-radius: 10px;
      background: #F9FAFB; color: #191F28; border: 1px solid #E5E8EB;
      cursor: pointer; text-decoration: none; display: inline-block;
      font-family: inherit; transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover { background: #F9FAFB; border-color: #E5E8EB; }
    .btn.primary { color: #3182F6; border-color: rgba(49, 130, 246, 0.3); }
    .btn.primary:hover { background: rgba(49, 130, 246, 0.1); }
    .version-nav {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px;
    }
    .version-nav a {
      font-size: 11px; color: #4E5968; padding: 4px 10px;
      background: #F9FAFB; border: 1px solid #E5E8EB; border-radius: 8px;
      text-decoration: none;
    }
    .version-nav a.active { color: #3182F6; border-color: rgba(49, 130, 246, 0.5); background: rgba(49, 130, 246, 0.08); }
    .version-nav a:hover { border-color: #E5E8EB; }
    .loading, .error { color: #8B95A1; text-align: center; padding: 40px; font-size: 14px; }
    .error { color: #F04452; }
    .back { display: inline-block; margin-top: 28px; color: #4E5968; text-decoration: none; font-size: 14px; }
    .back:hover { color: #3182F6; }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>
<body>
  <div class="wrap">
    <header>
      <h1 id="pageTitle">작업일지 뉴스레터</h1>
      <a href="../worklog.html">← 피드로</a>
    </header>

    <div class="meta" id="meta" style="display:none;">
      <span class="title" id="metaTitle"></span>
      <span class="version" id="metaVersion"></span>
    </div>

    <div class="version-nav" id="versionNav"></div>

    <div class="toolbar" id="toolbar" style="display:none;">
      <button class="btn primary" id="copyBtn">본문 복사</button>
      <a class="btn" id="githubLink" target="_blank" rel="noopener">GitHub 원본 ↗</a>
    </div>

    <div class="body" id="body"><div class="loading">불러오는 중…</div></div>

    <a class="back" href="../worklog.html">← 피드로 돌아가기</a>
  </div>

  <script>
    var params = new URLSearchParams(location.search);
    var file = params.get('file');

    var bodyEl = document.getElementById('body');
    var metaEl = document.getElementById('meta');
    var metaTitleEl = document.getElementById('metaTitle');
    var metaVersionEl = document.getElementById('metaVersion');
    var pageTitleEl = document.getElementById('pageTitle');
    var toolbarEl = document.getElementById('toolbar');
    var versionNavEl = document.getElementById('versionNav');
    var copyBtn = document.getElementById('copyBtn');
    var githubLink = document.getElementById('githubLink');

    function parseFileName(name) {
      var m = /^(\d{4}-\d{2}-\d{2})(?:_(v\d+\.\d+\.\d+|legacy))?\.md$/.exec(name);
      if (!m) return null;
      return { date: m[1], version: m[2] || '' };
    }

    function versionLabel(v) {
      if (v === 'legacy') return 'legacy';
      if (!v) return '최신';
      return v;
    }

    async function loadVersionNav(date, currentFile) {
      try {
        var res = await fetch('./index.json?_=' + Date.now());
        var data = await res.json();
        // versionless("최신") 엔트리는 공개 내비에서 숨긴다 — 뉴스레터판 이전의 스탠드업+태그 포맷이라 혼선 유발.
        var entries = (data.entries || []).filter(function(e) {
          if (e.date !== date) return false;
          if (!e.version || e.version === '') return false;
          return true;
        });
        if (entries.length <= 1) return;
        entries.sort(function(a, b) {
          var va = a.version || '';
          var vb = b.version || '';
          // legacy 는 맨 뒤
          if (va === 'legacy' && vb !== 'legacy') return 1;
          if (vb === 'legacy' && va !== 'legacy') return -1;
          // 나머지 v-번호는 내림차순 (최신이 앞)
          return vb.localeCompare(va);
        });
        versionNavEl.innerHTML = entries.map(function(e) {
          var label = versionLabel(e.version || '');
          var active = e.file === currentFile ? ' active' : '';
          return '<a class="' + active.trim() + '" href="?file=' + encodeURIComponent(e.file) + '">' + label + '</a>';
        }).join('');
      } catch (e) { /* silent */ }
    }

    async function load() {
      if (!file) {
        bodyEl.innerHTML = '<div class="error">파일이 지정되지 않았습니다. URL 에 ?file=... 파라미터가 필요해요.</div>';
        return;
      }
      var parsed = parseFileName(file);
      if (!parsed) {
        bodyEl.innerHTML = '<div class="error">파일명 형식을 인식할 수 없어요: ' + file + '</div>';
        return;
      }

      try {
        var res = await fetch('./' + file + '?_=' + Date.now());
        if (!res.ok) throw new Error('fetch failed');
        var text = await res.text();

        pageTitleEl.textContent = parsed.date + (parsed.version ? ' · ' + parsed.version : '') + ' 작업일지';
        document.title = parsed.date + ' 작업일지 - 강대종';

        var firstLine = text.split('\n').map(function(l) { return l.trim(); }).filter(function(l) { return l; })[0] || '';
        var firstParagraph = text.split('\n\n').map(function(p) { return p.trim(); }).filter(function(p) { return p; })[1] || '';
        metaTitleEl.textContent = firstParagraph.slice(0, 80) + (firstParagraph.length > 80 ? '…' : '');
        metaVersionEl.textContent = versionLabel(parsed.version);
        metaEl.style.display = 'flex';

        try {
          bodyEl.innerHTML = marked.parse(text, { breaks: false, gfm: true });
        } catch (err) {
          bodyEl.textContent = text;
        }
        toolbarEl.style.display = 'flex';
        githubLink.href = 'https://github.com/ssamssae/daejong-page/blob/main/worklog/' + file;

        copyBtn.onclick = function() {
          navigator.clipboard.writeText(text).then(function() {
            copyBtn.textContent = '복사됨';
            setTimeout(function() { copyBtn.textContent = '본문 복사'; }, 1500);
          }).catch(function() {
            copyBtn.textContent = '복사 실패';
            setTimeout(function() { copyBtn.textContent = '본문 복사'; }, 1500);
          });
        };

        loadVersionNav(parsed.date, file);
      } catch (e) {
        bodyEl.innerHTML = '<div class="error">본문을 불러올 수 없어요: ' + file + '</div>';
      }
    }

    load();
  </script>
</body>
</html>
